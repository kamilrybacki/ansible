---
# =============================================================================
# n8n Setup
# =============================================================================
# Deploys n8n workflow automation on a remote host via Docker.
#
# Usage:
#   ansible-playbook automation/n8n-setup/setup.yml \
#     -i automation/n8n-setup/inventory/hosts.ini \
#     --ask-become-pass
#
# Vault secrets (store before running):
#   vault kv put secret/n8n \
#     owner_password=<password> \
#     workflows_repo_token=<github-pat>   # only if workflows repo is private
#
# Service secrets (Netbox token, LibreNMS token, etc.) live at secret/n8n and
# are surfaced in workflows via ={{ $secrets.vault.KEY_NAME }} through n8n's
# native Vault External Secrets integration. Add new secrets to Vault at any
# time — n8n picks them up within N8N_EXTERNAL_SECRETS_UPDATE_INTERVAL seconds.
# Never hardcode tokens in workflow JSON files.
#
# After deployment, retrieve the MCP Access Token from the n8n UI
# and run the claude-n8n-mcp playbook to connect Claude Code.
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "n8n"
      when: _vault_available | bool

- name: Gather n8n host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: n8n_host_ip
      prompt: |

        ══════════════════════════════════════════════
          n8n Setup Wizard
        ══════════════════════════════════════════════

        [1/5] IP or hostname of the n8n host machine
      private: false

    - name: n8n_ssh_user
      prompt: "[2/5] SSH user for the n8n host"
      private: false

    - name: n8n_owner_email
      prompt: "[3/5] Email for the n8n owner account"
      private: false

    - name: n8n_owner_password
      prompt: "[4/5] Password for the n8n owner account"
      default: "{{ hostvars['localhost']['_vault_secrets']['owner_password'] | default('') }}"
      private: true
      confirm: true

    - name: n8n_owner_first_name
      prompt: "[5/5] First name for the n8n owner account"
      default: "Admin"
      private: false

  tasks:
    - name: Add n8n host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ n8n_host_ip }}"
        groups: n8n_hosts
        ansible_user: "{{ n8n_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        n8n_owner_email: "{{ n8n_owner_email }}"
        n8n_owner_password: "{{ n8n_owner_password }}"
        n8n_owner_first_name: "{{ n8n_owner_first_name }}"
        n8n_owner_last_name: "User"
        n8n_bind_address: "{{ '127.0.0.1' if n8n_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        n8n_workflows_repo_token: "{{ hostvars['localhost']['_vault_secrets']['workflows_repo_token'] | default('') }}"
        n8n_vault_addr: "{{ hostvars['localhost']['_vault_addr'] | default('') }}"
        n8n_vault_reader_token: "{{ hostvars['localhost']['_n8n_vault_reader_token'] | default('') }}"
        n8n_public_url: >-
          {{
            'https://' + n8n_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      no_log: true

- name: Store n8n secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "n8n"
        vault_secrets_data:
          owner_email: "{{ hostvars[groups['n8n_hosts'][0]]['n8n_owner_email'] | default('') }}"
          owner_password: "{{ hostvars[groups['n8n_hosts'][0]]['n8n_owner_password'] | default('') }}"
      when: _vault_available | default(false) | bool

- name: Create n8n Vault reader token for External Secrets
  hosts: localhost
  connection: local
  gather_facts: false
  when: _vault_available | default(false) | bool
  tasks:
    - name: Create n8n-secrets-reader Vault policy
      ansible.builtin.uri:
        url: "{{ _vault_addr }}/v1/sys/policies/acl/n8n-secrets-reader"
        method: PUT
        headers:
          X-Vault-Token: "{{ _vault_token }}"
        body_format: json
        body:
          policy: |
            path "secret/data/homelab/n8n" { capabilities = ["read"] }
            path "secret/metadata/homelab/n8n" { capabilities = ["read", "list"] }
        status_code: [200, 204]
      no_log: true

    - name: Generate n8n Vault reader token
      ansible.builtin.uri:
        url: "{{ _vault_addr }}/v1/auth/token/create"
        method: POST
        headers:
          X-Vault-Token: "{{ _vault_token }}"
        body_format: json
        body:
          policies: ["n8n-secrets-reader"]
          ttl: "87600h"
          display_name: "n8n-external-secrets"
          renewable: true
        status_code: [200]
      register: _n8n_vault_token_resp
      no_log: true

    - name: Store reader token as host fact
      ansible.builtin.set_fact:
        _n8n_vault_reader_token: "{{ _n8n_vault_token_resp.json.auth.client_token }}"
      no_log: true

- name: Install Docker and deploy n8n
  hosts: n8n_hosts
  become: true
  roles:
    - docker
    - n8n

- name: Integrate n8n with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _n8n_host_ip: "{{ hostvars['localhost']['n8n_host_ip'] }}"
    _caddy_proxy_host: "{{ docker_gateway_ip | default('172.20.0.1') if _n8n_host_ip in ['localhost', '127.0.0.1', '::1'] else _n8n_host_ip }}"
  tasks:
    - name: Integrate n8n when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for n8n
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ n8n_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _n8n_cf_dns
          changed_when: _n8n_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add n8n to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} N8N"
            unsafe_writes: true
            block: |
              http://{{ n8n_hostname }}.{{ saved_domain }} {
                import rate_limit
                import proxy_headers
                reverse_proxy http://{{ _caddy_proxy_host }}:{{ n8n_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for n8n
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ n8n_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ n8n_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add n8n to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} N8N"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - n8n:
                      icon: n8n.png
                      href: "https://{{ n8n_hostname }}.{{ saved_domain }}"
                      description: "Workflow automation"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _n8n_host_ip }} {{ n8n_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
