---
# n8n Docker settings
n8n_container_name: n8n
n8n_image: docker.n8n.io/n8nio/n8n
n8n_port: 5678
n8n_volume_name: n8n_data
n8n_restart_policy: unless-stopped
n8n_hostname: "n8n"
n8n_bind_address: "0.0.0.0"

# Docker network shared by n8n and the Vault shim sidecar
n8n_network_name: n8n-net

# External Secrets polling interval (seconds)
n8n_external_secrets_update_interval: "300"

# Vault KV path that holds n8n secrets (under the KV mount root)
# Secrets at this path are available in workflows as ={{ $secrets.vault.KEY_NAME }}
n8n_vault_kv_path: "homelab/n8n"

# Vault shim sidecar settings
n8n_vault_shim_container_name: n8n-vault-shim
n8n_vault_shim_image: n8n-vault-shim
n8n_vault_shim_build_dir: /tmp/n8n-vault-shim-build
n8n_vault_shim_force_rebuild: false

# n8n Source Control / workflow Git repository
# Workflows are cloned from this repo at deploy time and imported into n8n.
# For private repos, store a personal access token in Vault first:
#   vault kv put secret/homelab/n8n workflows_repo_token=<PAT>
n8n_workflows_repo: "https://github.com/kamilrybacki/n8n-workflows"
n8n_workflows_branch: main
n8n_workflows_clone_dir: /tmp/n8n-workflows

# Queue mode — set to true to switch n8n to queue execution mode
n8n_queue_mode: true

# Redis queue (lw-nas) — only used when n8n_queue_mode is true
n8n_queue_redis_host: "10.0.1.2"
n8n_queue_redis_port: "6379"
n8n_queue_redis_db: "0"
n8n_queue_redis_password: ""  # set from Vault (secret/homelab/n8n-postgres → redis_password)

# Postgres backend (shared-postgres on lw-nas)
n8n_db_type: "postgresdb"
n8n_db_host: "10.0.1.2"
n8n_db_port: "5432"
n8n_db_name: "n8n"
n8n_db_user: "n8n"
# n8n_db_password and n8n_encryption_key come from Vault (secret/homelab/n8n-postgres)

# Mount host SSH key read-only so Execute Command nodes can SSH to homelab nodes
n8n_extra_volumes:
  - "/home/kamil/.ssh/n8n-backup-key:/home/node/.ssh/n8n-backup-key:ro"
