---
# =============================================================================
# vault-n8n-sync sidecar
# =============================================================================
# Builds and runs a Python daemon that:
#   1. Reads secrets from HashiCorp Vault KV (secret/homelab/n8n)
#   2. Logs into n8n using owner credentials (also stored in Vault)
#   3. Creates / updates n8n Variables for each secret
#   4. Repeats every n8n_external_secrets_update_interval seconds
#
# Workflows reference secrets via ={{ $vars.KEY_NAME }} (community edition).
# =============================================================================

- name: Create n8n Docker network (idempotent)
  community.docker.docker_network:
    name: "{{ n8n_network_name }}"
    state: present

- name: Connect n8n container to n8n network
  community.docker.docker_network:
    name: "{{ n8n_network_name }}"
    connected:
      - "{{ n8n_container_name }}"
    appends: true

- name: Create sync daemon image build directory
  ansible.builtin.file:
    path: "{{ n8n_vault_shim_build_dir }}"
    state: directory
    mode: "0755"

- name: Copy sync daemon Docker build context
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ n8n_vault_shim_build_dir }}/{{ item | basename }}"
    mode: "0644"
  loop:
    - Dockerfile
    - shim.py
  register: _shim_build_context

- name: Build vault-n8n-sync Docker image
  community.docker.docker_image:
    name: "{{ n8n_vault_shim_image }}"
    source: build
    build:
      path: "{{ n8n_vault_shim_build_dir }}"
    state: present
    force_source: "{{ n8n_vault_shim_force_rebuild or _shim_build_context.changed }}"

- name: Start vault-n8n-sync container
  community.docker.docker_container:
    name: "{{ n8n_vault_shim_container_name }}"
    image: "{{ n8n_vault_shim_image }}"
    state: started
    restart_policy: "{{ n8n_restart_policy }}"
    networks:
      - name: "{{ n8n_network_name }}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    env:
      VAULT_ADDR: "{{ n8n_vault_addr }}"
      VAULT_TOKEN: "{{ n8n_vault_reader_token }}"
      VAULT_KV_PATH: "{{ n8n_vault_kv_path }}"
      N8N_CONTAINER: "{{ n8n_container_name }}"
      N8N_URL: "http://{{ n8n_container_name }}:5678"
      N8N_WORKFLOW_ID: "{{ n8n_vault_shim_workflow_id | default('netbox-homelab-updater') }}"
      SYNC_INTERVAL: "{{ n8n_external_secrets_update_interval }}"
  no_log: true
