---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Docker volume for n8n data
  community.docker.docker_volume:
    name: "{{ n8n_volume_name }}"
    state: present

- name: Start n8n container
  community.docker.docker_container:
    name: "{{ n8n_container_name }}"
    image: "{{ n8n_image }}"
    state: started
    restart_policy: "{{ n8n_restart_policy }}"
    published_ports:
      - "{{ n8n_bind_address }}:{{ n8n_port }}:5678"
    volumes:
      - "{{ n8n_volume_name }}:/home/node/.n8n"
    env: "{{ _n8n_env | combine(_n8n_public_url_env) }}"
  vars:
    _n8n_env:
      N8N_HOST: "{{ n8n_hostname }}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "{{ 'https' if n8n_public_url | default('') != '' else 'http' }}"
    _n8n_public_url_env: "{{ {'N8N_EDITOR_BASE_URL': n8n_public_url, 'WEBHOOK_URL': n8n_public_url} if n8n_public_url | default('') != '' else {} }}"

- name: Wait for n8n to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}"
    status_code: [200, 302]
  register: n8n_health
  until: n8n_health is not failed
  retries: "{{ n8n_health_check_retries }}"
  delay: "{{ n8n_health_check_delay }}"

- name: Check if owner account already exists
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}/rest/owner/setup"
    method: POST
    body_format: json
    body:
      email: "{{ n8n_owner_email }}"
      password: "{{ n8n_owner_password }}"
      firstName: "{{ n8n_owner_first_name }}"
      lastName: "{{ n8n_owner_last_name }}"
    status_code: [200, 400]
  register: owner_setup_result
  no_log: true

- name: Report owner account creation result
  ansible.builtin.debug:
    msg: >-
      {{ 'Owner account created successfully.'
         if owner_setup_result.status == 200
         else 'Owner account already exists (skipped).' }}

- name: Display n8n access information
  ansible.builtin.debug:
    msg: |
      n8n is running at http://{{ inventory_hostname }}:{{ n8n_port }}

      The instance-level MCP endpoint is:
        http://{{ inventory_hostname }}:{{ n8n_port }}/mcp-server/http

      Next steps:
        1. Log in to n8n at the URL above.
        2. Go to Settings > Instance-level MCP.
        3. Copy your MCP Access Token from the Access Token tab.
        4. Run the claude-n8n-mcp playbook to connect Claude Code:
             ansible-playbook dev-tools/claude-n8n-mcp/setup.yml \
               -i dev-tools/claude-n8n-mcp/inventory/hosts.ini
