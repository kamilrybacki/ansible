---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create n8n Docker network
  community.docker.docker_network:
    name: "{{ n8n_network_name }}"
    state: present

- name: Create Docker volume for n8n data
  community.docker.docker_volume:
    name: "{{ n8n_volume_name }}"
    state: present

- name: Start n8n container
  community.docker.docker_container:
    name: "{{ n8n_container_name }}"
    image: "{{ n8n_image }}"
    state: started
    restart_policy: "{{ n8n_restart_policy }}"
    published_ports:
      - "{{ n8n_bind_address }}:{{ n8n_port }}:5678"
    etc_hosts:
      host.docker.internal: host-gateway
    volumes: "{{ [n8n_volume_name + ':/home/node/.n8n'] + n8n_extra_volumes }}"
    networks:
      - name: "{{ n8n_network_name }}"
    env: "{{ _n8n_env | combine(_n8n_public_url_env) | combine(_n8n_queue_env) | combine(_n8n_db_env) | combine(_n8n_metrics_env) }}"
    comparisons:
      env: ignore   # vault-n8n-sync daemon owns N8N_VAR_* — Ansible must not fight it
  vars:
    _n8n_env:
      N8N_HOST: "{{ n8n_hostname }}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "{{ 'https' if n8n_public_url | default('') != '' else 'http' }}"
      N8N_SOURCE_CONTROL_ENABLED: "true"
      N8N_EXTERNAL_SECRETS_UPDATE_INTERVAL: "{{ n8n_external_secrets_update_interval }}"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RUNNERS_ALLOWED_ENV_VARS: "*"
      N8N_RUNNERS_ENABLED: "false"
      N8N_RUNNERS_INSECURE_MODE: "true"
      N8N_NODE_FUNCTION_ALLOW_BUILTIN: "*"
      N8N_RUNNERS_ALLOWED_BUILT_IN_MODULES: "*"
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
    _n8n_public_url_env: "{{ {'N8N_EDITOR_BASE_URL': n8n_public_url, 'WEBHOOK_URL': n8n_public_url} if n8n_public_url | default('') != '' else {} }}"
    _n8n_queue_env: >-
      {{
        {
          'EXECUTIONS_MODE': 'queue',
          'QUEUE_BULL_REDIS_HOST': n8n_queue_redis_host,
          'QUEUE_BULL_REDIS_PORT': n8n_queue_redis_port,
          'QUEUE_BULL_REDIS_DB': n8n_queue_redis_db,
          'QUEUE_BULL_REDIS_PASSWORD': n8n_queue_redis_password
        }
        if n8n_queue_mode | default(false) | bool else {}
      }}
    _n8n_db_env: >-
      {{
        {
          'DB_TYPE': n8n_db_type,
          'DB_POSTGRESDB_HOST': n8n_db_host,
          'DB_POSTGRESDB_PORT': n8n_db_port,
          'DB_POSTGRESDB_DATABASE': n8n_db_name,
          'DB_POSTGRESDB_USER': n8n_db_user,
          'DB_POSTGRESDB_PASSWORD': n8n_db_password,
          'N8N_ENCRYPTION_KEY': n8n_encryption_key
        }
        if n8n_db_type | default('') == 'postgresdb' else {}
      }}
    _n8n_metrics_env:
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_DEFAULT_METRICS: "true"
      N8N_METRICS_INCLUDE_QUEUE_METRICS: "{{ 'true' if n8n_queue_mode | default(false) | bool else 'false' }}"
      N8N_METRICS_QUEUE_METRICS_INTERVAL: "10"
      N8N_METRICS_INCLUDE_WORKFLOW_EXECUTION_DURATION: "true"
      N8N_METRICS_INCLUDE_CACHE_METRICS: "true"
      N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS: "false"
      N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL: "true"
      N8N_METRICS_INCLUDE_NODE_TYPE_LABEL: "true"

- name: Wait for n8n to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}"
    status_code: [200, 302]
  register: n8n_health
  until: n8n_health is not failed
  retries: "{{ n8n_health_check_retries }}"
  delay: "{{ n8n_health_check_delay }}"

- name: Check if owner account already exists
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}/rest/owner/setup"
    method: POST
    body_format: json
    body:
      email: "{{ n8n_owner_email }}"
      password: "{{ n8n_owner_password }}"
      firstName: "{{ n8n_owner_first_name }}"
      lastName: "{{ n8n_owner_last_name }}"
    status_code: [200, 400]
  register: owner_setup_result
  no_log: true

- name: Report owner account creation result
  ansible.builtin.debug:
    msg: >-
      {{ 'Owner account created successfully.'
         if owner_setup_result.status == 200
         else 'Owner account already exists (skipped).' }}

- name: Install git for workflow repository cloning
  ansible.builtin.apt:
    name: git
    state: present

- name: Import workflows from Git repository
  no_log: true
  block:
    - name: Build workflow repository clone URL
      ansible.builtin.set_fact:
        _n8n_workflows_clone_url: >-
          {%- set token = n8n_workflows_repo_token | default('') -%}
          {%- if token != '' -%}
          {{ n8n_workflows_repo | regex_replace('^(https?://)', '\1' + token + '@') }}
          {%- else -%}
          {{ n8n_workflows_repo }}
          {%- endif -%}

    - name: Clone workflows repository
      ansible.builtin.git:
        repo: "{{ _n8n_workflows_clone_url }}"
        dest: "{{ n8n_workflows_clone_dir }}"
        version: "{{ n8n_workflows_branch }}"
        force: true

    - name: Find workflow files in repository
      ansible.builtin.find:
        paths: "{{ n8n_workflows_clone_dir }}"
        patterns: "*.json"
        recurse: false
      register: _n8n_workflow_files
      no_log: false

    - name: Copy workflow files into n8n container
      ansible.builtin.command: >
        docker cp {{ item.path }}
        {{ n8n_container_name }}:/tmp/{{ item.path | basename }}
      loop: "{{ _n8n_workflow_files.files }}"
      changed_when: true
      when: _n8n_workflow_files.files | length > 0

    - name: Import workflows via n8n CLI
      ansible.builtin.command: >
        docker exec {{ n8n_container_name }}
        n8n import:workflow --input=/tmp/{{ item.path | basename }}
      loop: "{{ _n8n_workflow_files.files }}"
      register: _n8n_import_result
      changed_when: "'Successfully imported' in _n8n_import_result.stdout"
      when: _n8n_workflow_files.files | length > 0
      no_log: false

    - name: Remove workflow clone directory
      ansible.builtin.file:
        path: "{{ n8n_workflows_clone_dir }}"
        state: absent


- name: Display n8n access information
  ansible.builtin.debug:
    msg: |
      n8n is running at http://{{ inventory_hostname }}:{{ n8n_port }}

      The instance-level MCP endpoint is:
        http://{{ inventory_hostname }}:{{ n8n_port }}/mcp-server/http

      Next steps:
        1. Log in to n8n at the URL above.
        2. Go to Settings > Source Control.
           - Connect to: {{ n8n_workflows_repo | default('(no repo configured)') }}
           - Generate SSH key pair in n8n and add the public key as a deploy key
             to the repository (write access required for push/backup).
           - For private repos: store a PAT in Vault before deploying:
               vault kv put secret/n8n workflows_repo_token=<PAT>
        NOTE: Service secrets live in Vault at secret/n8n and are available in
        workflows as ={{ $env.N8N_VAR_KEY_NAME }} (community edition — External Secrets
        integration requires enterprise license). To add a new secret:
          vault kv patch secret/n8n my_new_token=<value>
        n8n will pick it up within {{ n8n_external_secrets_update_interval }}s automatically.
        3. Go to Settings > Instance-level MCP.
        4. Copy your MCP Access Token from the Access Token tab.
        5. Run the claude-n8n-mcp playbook to connect Claude Code:
             ansible-playbook dev-tools/claude-n8n-mcp/setup.yml \
               -i dev-tools/claude-n8n-mcp/inventory/hosts.ini
