---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Docker volume for n8n data
  community.docker.docker_volume:
    name: "{{ n8n_volume_name }}"
    state: present

- name: Start n8n container
  community.docker.docker_container:
    name: "{{ n8n_container_name }}"
    image: "{{ n8n_image }}"
    state: started
    restart_policy: "{{ n8n_restart_policy }}"
    published_ports:
      - "{{ n8n_bind_address }}:{{ n8n_port }}:5678"
    etc_hosts:
      host.docker.internal: host-gateway
    volumes:
      - "{{ n8n_volume_name }}:/home/node/.n8n"
    env: "{{ _n8n_env | combine(_n8n_public_url_env) }}"
  vars:
    _n8n_env:
      N8N_HOST: "{{ n8n_hostname }}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "{{ 'https' if n8n_public_url | default('') != '' else 'http' }}"
      N8N_SOURCE_CONTROL_ENABLED: "true"
      N8N_VAR_NETBOX_TOKEN: "{{ n8n_netbox_token | default('') }}"
      N8N_VAR_LIBRENMS_TOKEN: "{{ n8n_librenms_token | default('') }}"
    _n8n_public_url_env: "{{ {'N8N_EDITOR_BASE_URL': n8n_public_url, 'WEBHOOK_URL': n8n_public_url} if n8n_public_url | default('') != '' else {} }}"

- name: Wait for n8n to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}"
    status_code: [200, 302]
  register: n8n_health
  until: n8n_health is not failed
  retries: "{{ n8n_health_check_retries }}"
  delay: "{{ n8n_health_check_delay }}"

- name: Check if owner account already exists
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}/rest/owner/setup"
    method: POST
    body_format: json
    body:
      email: "{{ n8n_owner_email }}"
      password: "{{ n8n_owner_password }}"
      firstName: "{{ n8n_owner_first_name }}"
      lastName: "{{ n8n_owner_last_name }}"
    status_code: [200, 400]
  register: owner_setup_result
  no_log: true

- name: Report owner account creation result
  ansible.builtin.debug:
    msg: >-
      {{ 'Owner account created successfully.'
         if owner_setup_result.status == 200
         else 'Owner account already exists (skipped).' }}

- name: Install git for workflow repository cloning
  ansible.builtin.apt:
    name: git
    state: present

- name: Import workflows from Git repository
  no_log: true
  block:
    - name: Build workflow repository clone URL
      ansible.builtin.set_fact:
        _n8n_workflows_clone_url: >-
          {%- set token = n8n_workflows_repo_token | default('') -%}
          {%- if token != '' -%}
          {{ n8n_workflows_repo | regex_replace('^(https?://)', '\1' + token + '@') }}
          {%- else -%}
          {{ n8n_workflows_repo }}
          {%- endif -%}

    - name: Clone workflows repository
      ansible.builtin.git:
        repo: "{{ _n8n_workflows_clone_url }}"
        dest: "{{ n8n_workflows_clone_dir }}"
        version: "{{ n8n_workflows_branch }}"
        force: true

    - name: Find workflow files in repository
      ansible.builtin.find:
        paths: "{{ n8n_workflows_clone_dir }}"
        patterns: "*.json"
        recurse: false
      register: _n8n_workflow_files
      no_log: false

    - name: Copy workflow files into n8n container
      ansible.builtin.command: >
        docker cp {{ item.path }}
        {{ n8n_container_name }}:/tmp/{{ item.path | basename }}
      loop: "{{ _n8n_workflow_files.files }}"
      changed_when: true
      when: _n8n_workflow_files.files | length > 0

    - name: Import workflows via n8n CLI
      ansible.builtin.command: >
        docker exec {{ n8n_container_name }}
        n8n import:workflow --input=/tmp/{{ item.path | basename }}
      loop: "{{ _n8n_workflow_files.files }}"
      register: _n8n_import_result
      changed_when: "'Successfully imported' in _n8n_import_result.stdout"
      when: _n8n_workflow_files.files | length > 0
      no_log: false

    - name: Remove workflow clone directory
      ansible.builtin.file:
        path: "{{ n8n_workflows_clone_dir }}"
        state: absent


- name: Display n8n access information
  ansible.builtin.debug:
    msg: |
      n8n is running at http://{{ inventory_hostname }}:{{ n8n_port }}

      The instance-level MCP endpoint is:
        http://{{ inventory_hostname }}:{{ n8n_port }}/mcp-server/http

      Next steps:
        1. Log in to n8n at the URL above.
        2. Go to Settings > Source Control.
           - Connect to: {{ n8n_workflows_repo | default('(no repo configured)') }}
           - Generate SSH key pair in n8n and add the public key as a deploy key
             to the repository (write access required for push/backup).
           - For private repos: store a PAT in Vault before deploying:
               vault kv put secret/n8n workflows_repo_token=<PAT>
        NOTE: Service API tokens (Netbox, LibreNMS, etc.) must be stored in Vault
        and are injected as n8n variables. Workflows reference them via $vars.*
        and must NOT hardcode them directly. Store with:
          vault kv put secret/n8n netbox_token=<token> librenms_token=<token>
        3. Go to Settings > Instance-level MCP.
        4. Copy your MCP Access Token from the Access Token tab.
        5. Run the claude-n8n-mcp playbook to connect Claude Code:
             ansible-playbook dev-tools/claude-n8n-mcp/setup.yml \
               -i dev-tools/claude-n8n-mcp/inventory/hosts.ini
