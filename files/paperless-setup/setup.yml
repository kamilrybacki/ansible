---
# =============================================================================
# Paperless-ngx Setup
# =============================================================================
# Deploys Paperless-ngx document management on a remote host via Docker Compose.
#
# Usage:
#   ansible-playbook files/paperless-setup/setup.yml \
#     -i files/paperless-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "paperless"
      when: _vault_available | bool

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Paperless-ngx Setup Wizard
        ══════════════════════════════════════════════

        [1/5] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/5] SSH user for the target machine"
      private: false

    - name: paperless_admin_user
      prompt: "[3/5] Admin username"
      default: "admin"
      private: false

    - name: paperless_admin_password
      prompt: "[4/5] Admin password"
      default: "{{ hostvars['localhost']['_vault_secrets']['admin_password'] | default('') }}"
      private: true
      confirm: true

    - name: paperless_document_path
      prompt: "[5/5] Document storage path (leave blank for Docker volume, or enter NAS/external path)"
      default: ""
      private: false

  tasks:
    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: paperless_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        paperless_admin_user: "{{ paperless_admin_user }}"
        paperless_admin_password: "{{ paperless_admin_password }}"
        paperless_document_path: "{{ paperless_document_path }}"
        paperless_bind_address: "{{ '127.0.0.1' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        paperless_public_url: >-
          {{
            'https://' + paperless_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      no_log: true

- name: Store Paperless secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "paperless"
        vault_secrets_data:
          admin_user: "{{ hostvars[groups['paperless_hosts'][0]]['paperless_admin_user'] | default('') }}"
          admin_password: "{{ hostvars[groups['paperless_hosts'][0]]['paperless_admin_password'] | default('') }}"
      when: _vault_available | default(false) | bool

- name: Install Docker and deploy Paperless-ngx
  hosts: paperless_hosts
  become: true
  roles:
    - docker
    - paperless

- name: Integrate Paperless-ngx with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Paperless
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ paperless_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _paperless_cf_dns
          changed_when: _paperless_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Paperless to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} PAPERLESS"
            unsafe_writes: true
            block: |
              http://{{ paperless_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ paperless_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Paperless
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ paperless_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ paperless_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Paperless to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} PAPERLESS"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - Paperless:
                      icon: paperless-ngx.png
                      href: "https://{{ paperless_hostname }}.{{ saved_domain }}"
                      description: "Document management"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ paperless_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
