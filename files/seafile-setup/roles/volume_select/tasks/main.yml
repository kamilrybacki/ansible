---
- name: Skip volume selection if path already set
  when: seafile_data_path | length > 0
  block:
    - name: Use pre-configured data path
      ansible.builtin.debug:
        msg: "Using pre-configured data path: {{ seafile_data_path }}"

    - name: End role early
      ansible.builtin.meta: end_role

- name: Gather mounted filesystems
  ansible.builtin.command: findmnt -J -t ext4,xfs,btrfs,ntfs,vfat,exfat -o TARGET,SOURCE,FSTYPE,SIZE,AVAIL
  register: findmnt_output
  changed_when: false

- name: Parse mount points
  ansible.builtin.set_fact:
    available_mounts: "{{ (findmnt_output.stdout | from_json).filesystems }}"

- name: Display available volumes
  ansible.builtin.debug:
    msg: >-
      [{{ idx }}] {{ item.target }}
      ({{ item.source }} - {{ item.fstype }},
      {{ item.avail | default('N/A') }} free of {{ item.size | default('N/A') }})
  loop: "{{ available_mounts }}"
  loop_control:
    index_var: idx
    label: "{{ item.target }}"

- name: Prompt user to select a volume
  ansible.builtin.pause:
    prompt: "Enter the number of the volume to use for Seafile data storage"
  register: volume_choice

- name: Validate selection
  ansible.builtin.assert:
    that:
      - volume_choice.user_input | int >= 0
      - volume_choice.user_input | int < (available_mounts | length)
    fail_msg: "Invalid selection '{{ volume_choice.user_input }}'. Must be between 0 and {{ (available_mounts | length) - 1 }}"

- name: Set selected data path
  ansible.builtin.set_fact:
    seafile_data_path: "{{ available_mounts[volume_choice.user_input | int].target }}/seafile-data"

- name: Confirm selected volume
  ansible.builtin.debug:
    msg: "Seafile data will be stored at: {{ seafile_data_path }}"

- name: Create Seafile data directory on selected volume
  ansible.builtin.file:
    path: "{{ seafile_data_path }}"
    state: directory
    mode: "0755"
  become: true
