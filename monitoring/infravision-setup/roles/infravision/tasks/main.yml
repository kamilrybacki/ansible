---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create InfraVision directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ infravision_data_dir }}"
    - "{{ infravision_data_dir }}/dist-out"

- name: Clone or update InfraVision repo
  ansible.builtin.shell: |
    if [ -d "{{ infravision_data_dir }}/.git" ]; then
      cd "{{ infravision_data_dir }}" && git pull --ff-only
    else
      git clone "{{ infravision_repo }}" "{{ infravision_data_dir }}"
    fi
  become_user: "{{ ansible_user }}"
  register: _git_result
  changed_when: "'Already up to date' not in _git_result.stdout"

- name: Clone or update Ansible repo (for data pipeline)
  ansible.builtin.shell: |
    if [ -d "/home/{{ ansible_user }}/Code/ansible/.git" ]; then
      cd "/home/{{ ansible_user }}/Code/ansible" && git pull --ff-only
    else
      mkdir -p "/home/{{ ansible_user }}/Code"
      git clone "{{ infravision_ansible_repo }}" "/home/{{ ansible_user }}/Code/ansible"
    fi
  become_user: "{{ ansible_user }}"
  register: _ansible_git_result
  changed_when: "'Already up to date' not in _ansible_git_result.stdout"

- name: Write pipeline .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ infravision_data_dir }}/.env"
    owner: "{{ ansible_user }}"
    mode: "0600"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ infravision_data_dir }}/docker-compose.yml"
    mode: "0640"

- name: Template nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ infravision_data_dir }}/nginx.conf"
    mode: "0644"

- name: Pull node:20-alpine image
  community.docker.docker_image:
    name: node:20-alpine
    source: pull

- name: Run initial data pipeline + build
  ansible.builtin.shell: |
    source {{ infravision_data_dir }}/.env
    export NETBOX_URL NETBOX_TOKEN INFRA_DOMAIN ANSIBLE_PATH GRAFANA_URL GRAFANA_TOKEN
    bash {{ infravision_data_dir }}/scripts/rebuild.sh
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  register: _build_result

- name: Show build result
  ansible.builtin.debug:
    msg: "{{ _build_result.stdout_lines[-3:] }}"

- name: Start InfraVision nginx container
  community.docker.docker_compose_v2:
    project_src: "{{ infravision_data_dir }}"
    state: present

- name: Verify site is accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ infravision_port }}"
    status_code: 200
    timeout: 10
  retries: 3
  delay: 2

- name: Create daily rebuild cron
  ansible.builtin.cron:
    name: "infravision-rebuild"
    minute: "{{ infravision_rebuild_minute }}"
    hour: "{{ infravision_rebuild_hour }}"
    job: >-
      cd {{ infravision_data_dir }} &&
      source .env &&
      export NETBOX_URL NETBOX_TOKEN INFRA_DOMAIN ANSIBLE_PATH GRAFANA_URL GRAFANA_TOKEN &&
      bash scripts/rebuild.sh >> /var/log/infravision-rebuild.log 2>&1
    user: "{{ ansible_user }}"

- name: Create logrotate config
  ansible.builtin.copy:
    dest: /etc/logrotate.d/infravision
    content: |
      /var/log/infravision-rebuild.log {
        weekly
        rotate 4
        compress
        missingok
        notifempty
      }
