---
# =============================================================================
# InfraVision Setup
# =============================================================================
# Deploys the InfraVision infrastructure map as a static site on a target host,
# with nginx serving, Caddy reverse proxy, Cloudflare tunnel DNS, and a daily
# midnight cron to rebuild from live data sources (NetBox, Prometheus, Ansible).
#
# Usage:
#   ansible-playbook monitoring/infravision-setup/setup.yml \
#     -i monitoring/infravision-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load InfraVision secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "infravision"
      when: _vault_available | bool

    - name: Load NetBox secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "netbox"
      when: _vault_available | bool
    - name: Save NetBox secrets
      ansible.builtin.set_fact:
        _netbox_secrets: "{{ _vault_secrets }}"
      when: _vault_available | bool

    - name: Load Grafana secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "grafana"
      when: _vault_available | bool
    - name: Save Grafana secrets
      ansible.builtin.set_fact:
        _grafana_secrets: "{{ _vault_secrets }}"
      when: _vault_available | bool

- name: Gather deployment details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          InfraVision Setup Wizard
        ══════════════════════════════════════════════

        [1/4] IP or hostname of the target machine
      default: "192.168.0.108"
      private: false

    - name: target_ssh_user
      prompt: "[2/4] SSH user for the target machine"
      default: "kamil"
      private: false

    - name: netbox_url
      prompt: "[3/6] NetBox URL (e.g. http://host:8081)"
      default: ""
      private: false

    - name: netbox_token
      prompt: "[4/6] NetBox API token (leave empty if loaded from Vault)"
      private: true

    - name: grafana_url
      prompt: "[5/6] Grafana URL (e.g. http://host:3000)"
      default: ""
      private: false

    - name: grafana_token
      prompt: "[6/6] Grafana service account token (leave empty if loaded from Vault)"
      private: true

  tasks:
    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: infravision_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_connection: "{{ 'local' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else 'ssh' }}"
        ansible_python_interpreter: /usr/bin/python3
        infravision_netbox_url: "{{ netbox_url }}"
        infravision_netbox_token: >-
          {{ netbox_token | default('') or _netbox_secrets.api_token | default('') }}
        infravision_domain: "{{ saved_domain | default('') }}"
        infravision_grafana_url: "{{ grafana_url }}"
        infravision_grafana_token: >-
          {{ grafana_token | default('') or _grafana_secrets.service_account_token | default('') }}

- name: Deploy InfraVision
  hosts: infravision_hosts
  become: true
  roles:
    - infravision

- name: Integrate with secure homelab (Caddy + Cloudflare Tunnel)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ infravision_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _cf_dns
          changed_when: _cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add InfraVision to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} INFRAVISION"
            unsafe_writes: true
            block: |
              http://{{ infravision_hostname }}.{{ saved_domain }} {
                import rate_limit
                import proxy_headers
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ infravision_port }}
              }
          notify: reload caddy

        - name: Reload Caddy if config changed
          community.docker.docker_container_exec:
            container: caddy
            command: caddy reload --config /etc/caddy/Caddyfile
          when: false  # Only runs via handler

    - name: Report deployment
      ansible.builtin.debug:
        msg: |
          ✓ InfraVision deployed!
            Local:  http://{{ _target_host_ip }}:{{ infravision_port | default(8090) }}
            Public: https://{{ infravision_hostname }}.{{ saved_domain | default('') }}
            Rebuild: daily at midnight via cron

  handlers:
    - name: reload caddy
      community.docker.docker_container_exec:
        container: caddy
        command: caddy reload --config /etc/caddy/Caddyfile
