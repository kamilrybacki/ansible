# librenms-setup/roles/librenms/tasks/main.yml
---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create LibreNMS data directory
  ansible.builtin.file:
    path: "{{ librenms_data_dir }}"
    state: directory
    mode: "0755"

- name: Write custom librenms crontab
  ansible.builtin.template:
    src: librenms-crontab.j2
    dest: "{{ librenms_data_dir }}/librenms-crontab"
    mode: "0644"

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ librenms_data_dir }}/docker-compose.yml"
    mode: "0640"

- name: Pull LibreNMS images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ librenms_data_dir }}"
  register: compose_pull
  changed_when: "'Pull complete' in compose_pull.stdout or compose_pull.rc == 0"

- name: Start LibreNMS stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ librenms_data_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

- name: Wait for LibreNMS web UI to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ librenms_port }}"
    status_code: [200, 302]
  register: librenms_health
  until: librenms_health is not failed
  retries: "{{ librenms_health_check_retries }}"
  delay: "{{ librenms_health_check_delay }}"

- name: Configure dispatcher poller worker counts
  ansible.builtin.command: >
    docker exec librenms_dispatcher sh -c
    "su -s /bin/sh librenms -c '/opt/librenms/lnms config:set {{ item.key }} {{ item.value }}'"
  loop:
    - {key: service_poller_workers,    value: "{{ librenms_poller_workers }}"}
    - {key: service_discovery_workers, value: "{{ librenms_discovery_workers }}"}
    - {key: service_services_workers,  value: "{{ librenms_services_workers }}"}
  changed_when: true

- name: Configure SNMP community string
  ansible.builtin.command: >
    docker exec librenms_app lnms config:set snmp.community
    '["{{ librenms_snmp_community }}"]'
  changed_when: true

- name: Configure discovery networks
  ansible.builtin.shell: |
    networks=$(echo "{{ librenms_discovery_networks }}" | python3 -c \
      "import sys,json; nets=[n.strip() for n in sys.stdin.read().split(',')]; print(json.dumps(nets))")
    docker exec librenms_app lnms config:set nets "$networks"
  changed_when: true

- name: Trigger initial network discovery
  ansible.builtin.command: docker exec librenms_app lnms discovery:all
  changed_when: true
  async: 120
  poll: 0

# ── Grafana API token (for Alloy metrics scraping) ───────────────────────────
- name: Check if Grafana scrape token already exists in LibreNMS DB
  ansible.builtin.shell: |
    docker exec {{ 'shared-mariadb' if librenms_use_shared_db | default(false) | bool else 'librenms_db' }} mysql -u librenms -p"{{ librenms_db_password }}" librenms \
      -sNe "SELECT COUNT(*) FROM api_tokens WHERE description='grafana-alloy';"
  register: _token_count
  changed_when: false
  no_log: true

- name: Generate and insert Grafana scrape token into LibreNMS DB
  ansible.builtin.shell: |
    TOKEN=$(python3 -c "import secrets; print(secrets.token_hex(32))")
    docker exec {{ 'shared-mariadb' if librenms_use_shared_db | default(false) | bool else 'librenms_db' }} mysql -u librenms -p"{{ librenms_db_password }}" librenms \
      -e "INSERT INTO api_tokens (user_id, token_hash, description)
          SELECT id, '${TOKEN}', 'grafana-alloy' FROM users LIMIT 1;"
  when: _token_count.stdout | trim == '0'
  changed_when: true
  no_log: true

- name: Read Grafana scrape token from LibreNMS DB
  ansible.builtin.shell: |
    docker exec {{ 'shared-mariadb' if librenms_use_shared_db | default(false) | bool else 'librenms_db' }} mysql -u librenms -p"{{ librenms_db_password }}" librenms \
      -sNe "SELECT token_hash FROM api_tokens WHERE description='grafana-alloy' LIMIT 1;"
  register: _librenms_grafana_token
  changed_when: false
  no_log: true

- name: Expose token as host fact for parent playbook
  ansible.builtin.set_fact:
    librenms_grafana_api_token: "{{ _librenms_grafana_token.stdout | trim }}"
  no_log: true

- name: Display LibreNMS access information
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════
        LibreNMS is running!
      ══════════════════════════════════════════════

      Web UI  : http://{{ inventory_hostname }}:{{ librenms_port }}

      First login:
        1. Open the URL above
        2. Create your admin account
        3. Go to Devices → Add Device to add hosts manually,
           or wait for autodiscovery to find devices on:
           {{ librenms_discovery_networks }}

      Topology maps:
        Overview → Network Map  (after devices are discovered)

      SNMP community : {{ librenms_snmp_community }}
      Syslog         : UDP/TCP 514 (configure devices to send here)
