# librenms-setup/group_vars/all.yml
---
librenms_version: "26.3.1"
librenms_port: 8080
librenms_data_dir: /opt/librenms
librenms_container_name: librenms
librenms_hostname: "librenms"
librenms_db_root_password: "root_{{ librenms_db_password }}"

librenms_health_check_retries: 20
librenms_health_check_delay: 10

# Dispatcher CPU and polling tuning
librenms_poller_workers: 4           # parallel poller workers (default was 24)
librenms_discovery_workers: 3        # parallel discovery workers (default was 16)
librenms_services_workers: 2         # parallel services workers (default was 8)
librenms_dispatcher_cpu_limit: "1.5" # hard CPU cap on dispatcher container

# App container tuning
librenms_app_cpu_limit: "1.0"        # cap app container CPU (prevents artisan cron bursting)
librenms_cron_schedule_interval: 5   # artisan schedule:run every N minutes (default was 1)
