---
# =============================================================================
# Grafana Stack Setup
# =============================================================================
# Deploys Grafana + Loki + Mimir + local Grafana Alloy agent as a Docker
# Compose stack on a remote host.
#
# Usage:
#   ansible-playbook monitoring/grafana-stack-setup/setup.yml \
#     -i monitoring/grafana-stack-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Grafana Stack Setup Wizard
        ══════════════════════════════════════════════

        [1/3] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/3] SSH user for the target machine"
      private: false

    - name: grafana_admin_password
      prompt: "[3/3] Grafana admin password"
      private: true
      confirm: true

  tasks:
    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: grafana_stack_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_connection: "{{ 'local' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else 'ssh' }}"
        ansible_python_interpreter: /usr/bin/python3
        grafana_bind_address: "0.0.0.0"
        grafana_admin_password: "{{ grafana_admin_password }}"
        grafana_public_url: >-
          {{
            'https://' + grafana_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
        grafana_oidc_client_secret: >-
          {{ hostvars['localhost']['saved_authelia_oidc_client_secret_grafana'] | default('') }}
        grafana_oidc_auth_domain: >-
          {{
            'auth.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}

- name: Install Docker and deploy Grafana stack
  hosts: grafana_stack_hosts
  become: true
  roles:
    - docker
    - grafana-stack

- name: Integrate Grafana with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Grafana
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ grafana_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _grafana_cf_dns
          changed_when: _grafana_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Grafana to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} GRAFANA"
            unsafe_writes: true
            block: |
              http://{{ grafana_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ docker_gateway_ip | default('172.20.0.1') }}:{{ grafana_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Grafana
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ grafana_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ grafana_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Grafana to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} GRAFANA"
            insertafter: "- Monitoring:"
            unsafe_writes: true
            block: |2
                  - Grafana:
                      icon: grafana.png
                      href: "https://{{ grafana_hostname }}.{{ saved_domain }}"
                      description: "Metrics, logs & dashboards"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ grafana_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
