---
grafana_image: "grafana/grafana:11.4.0"
grafana_port: 3000
grafana_hostname: "grafana"
grafana_bind_address: "127.0.0.1"
grafana_public_url: ""
grafana_restart_policy: unless-stopped
grafana_data_dir: /opt/grafana-stack
grafana_admin_user: admin
grafana_admin_password: ""
grafana_health_check_retries: 20
grafana_health_check_delay: 10
grafana_timezone: "Europe/Warsaw"

loki_image: "grafana/loki:3.3.2"
loki_port: 3100

mimir_image: "grafana/mimir:2.14.0"
mimir_port: 9009

alloy_image: "grafana/alloy:v1.5.1"
docker_exporter_image: "ghcr.io/davidborzek/docker-exporter:v0.3.0"

# OpenClaw metrics exporter — disabled (OpenClaw is on K8s, not Docker)
openclaw_metrics_host: ""
openclaw_metrics_port: 9101

# Security service metrics — Alloy is on homelab-net, so use container names directly
caddy_metrics_host: "caddy"
caddy_metrics_port: 2019

authelia_metrics_host: "authelia"   # requires telemetry.metrics.enabled: true in authelia config
authelia_metrics_port: 9959

crowdsec_metrics_host: "crowdsec"
crowdsec_metrics_port: 6060

vault_metrics_host: "172.19.0.1"   # Vault is on vault_default; reach via Docker gateway (0.0.0.0:8200 published)
vault_metrics_port: 8200
vault_metrics_token: ""   # Loaded from Vault at deploy time via vault-integration (secret/grafana-stack → vault_metrics_token)

# DNS for Alloy container — use public DNS (not Pi-hole) so blackbox probe domains resolve to
# real Cloudflare IPs. Docker internal resolver (127.0.0.11) still handles container names.
pihole_dns_ip: "1.1.1.1"

pihole_exporter_host: ""   # Enable after running pihole role with pihole_exporter_enabled: true
pihole_exporter_port: 9617

wireguard_exporter_host: ""   # Enable after running wireguard role with wireguard_exporter_enabled: true
wireguard_exporter_port: 9586

# Application service probe URLs — HTTPS via public domain to get SSL cert expiry metrics
# extra_hosts disabled: Caddy doesn't serve HTTPS on its Docker IP. Public DNS (1.1.1.1)
# resolves probe domains to Cloudflare IPs which are reachable from the Docker container.
probe_extra_hosts: []

probe_n8n_url: "https://n8n.kamilandrzejrybacki.dpdns.org"
probe_paperless_url: "https://paperless.kamilandrzejrybacki.dpdns.org"
probe_netbox_url: "https://netbox.kamilandrzejrybacki.dpdns.org"
probe_outline_url: ""
probe_vaultwarden_url: ""   # removed from homelab
probe_seafile_url: ""

# Remote Mimir/Loki endpoints (on lw-nas)
mimir_remote_host: "10.0.1.2"
mimir_remote_port: 9009
loki_remote_host: "10.0.1.2"
loki_remote_port: 3100
