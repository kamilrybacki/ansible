---
grafana_image: "grafana/grafana:11.4.0"
grafana_port: 3000
grafana_hostname: "grafana"
grafana_bind_address: "127.0.0.1"
grafana_public_url: ""
grafana_restart_policy: unless-stopped
grafana_data_dir: /opt/grafana-stack
grafana_admin_user: admin
grafana_admin_password: ""
grafana_health_check_retries: 20
grafana_health_check_delay: 10
grafana_timezone: "Europe/Warsaw"

loki_image: "grafana/loki:3.3.2"
loki_port: 3100

mimir_image: "grafana/mimir:2.14.0"
mimir_port: 9009

alloy_image: "grafana/alloy:v1.5.1"

# OpenClaw metrics exporter — use Docker gateway IP so Alloy (in grafana-stack network) can reach it
openclaw_metrics_host: "172.19.0.1"
openclaw_metrics_port: 9101

# Security service metrics — set host to Node 1 LAN IP (e.g. 10.0.0.1) to enable scraping
caddy_metrics_host: ""
caddy_metrics_port: 2019

authelia_metrics_host: ""
authelia_metrics_port: 9959

crowdsec_metrics_host: ""
crowdsec_metrics_port: 6060

vault_metrics_host: ""
vault_metrics_port: 8200
vault_metrics_token: ""   # Vault token with sys/metrics read policy (see spec prerequisites)

pihole_exporter_host: ""
pihole_exporter_port: 9617

wireguard_exporter_host: ""
wireguard_exporter_port: 9586

# Application service probe URLs — set to internal URL (e.g. http://10.0.0.1:PORT) to enable probe
probe_n8n_url: ""
probe_paperless_url: ""
probe_netbox_url: ""
probe_outline_url: ""
probe_vaultwarden_url: ""
probe_seafile_url: ""
probe_dify_url: ""
