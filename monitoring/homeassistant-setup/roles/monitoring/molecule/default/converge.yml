---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Create mock HA config directory
      ansible.builtin.file:
        path: "{{ ha_config_dir }}"
        state: directory
        mode: "0755"
  tasks:
    - name: Deploy Home Assistant configuration
      ansible.builtin.template:
        src: ../../templates/configuration.yaml.j2
        dest: "{{ ha_config_dir }}/configuration.yaml"
        mode: "0644"
