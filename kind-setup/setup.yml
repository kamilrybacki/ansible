---
- name: Provision a local Kubernetes cluster with kind
  hosts: local
  become: true
  vars_prompt:
    - name: cluster_name
      prompt: "Cluster name"
      default: "local-cluster"
      private: false

    - name: cluster_worker_count
      prompt: "Number of worker nodes"
      default: "2"
      private: false

    - name: cluster_api_port
      prompt: "API server host port"
      default: "6443"
      private: false

    - name: cluster_http_port
      prompt: "Host HTTP port (mapped to control-plane port 80)"
      default: "80"
      private: false

    - name: cluster_https_port
      prompt: "Host HTTPS port (mapped to control-plane port 443)"
      default: "443"
      private: false

  roles:
    - docker
    - kind
    - cluster
