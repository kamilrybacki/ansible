---
- name: Identify default network interface
  ansible.builtin.set_fact:
    node2_default_iface: "{{ ansible_default_ipv4.interface }}"

- name: Create networkd drop-in directory for default interface
  ansible.builtin.file:
    path: "/etc/systemd/network/10-netplan-{{ node2_default_iface }}.network.d"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add persistent route to NAS subnet via Node1
  ansible.builtin.copy:
    dest: "/etc/systemd/network/10-netplan-{{ node2_default_iface }}.network.d/nas-route.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Route]
      Destination={{ nas_link_subnet }}
      Gateway={{ node1_lan_ip }}
  register: _nas_route

- name: Restart systemd-networkd to apply route
  ansible.builtin.systemd:
    name: systemd-networkd
    state: restarted
  when: _nas_route.changed
