---
- name: Deploy netplan config for USB-ethernet adapter
  ansible.builtin.template:
    src: 10-nas-link.yaml.j2
    dest: /etc/netplan/10-nas-link.yaml
    owner: root
    group: root
    mode: "0600"
  notify: apply netplan

- name: Enable IPv4 forwarding (persistent)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Add NAT MASQUERADE rules to UFW before.rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: "^\\*filter"
    marker: "# {mark} ANSIBLE MANAGED — NAS MASQUERADE"
    block: |
      *nat
      :POSTROUTING ACCEPT [0:0]
      -A POSTROUTING -s {{ nas_link_subnet }} -o {{ node1_wifi_iface }} -j MASQUERADE
      -A POSTROUTING -s {{ nas_link_subnet }} -o {{ node1_wired_iface }} -j MASQUERADE
      COMMIT
  notify: reload ufw

- name: Allow SSH from NAS subnet
  community.general.ufw:
    rule: allow
    src: "{{ nas_link_subnet }}"
    port: "22"
    proto: tcp
    comment: "SSH from NAS subnet"

- name: Allow forwarded traffic from NAS subnet
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ nas_link_subnet }}"
    comment: "Forward traffic from NAS subnet"
