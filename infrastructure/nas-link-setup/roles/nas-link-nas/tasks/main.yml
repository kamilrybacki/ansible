---
- name: Deploy netplan config for NAS ethernet
  ansible.builtin.template:
    src: 00-eno1.yaml.j2
    dest: /etc/netplan/00-eno1.yaml
    owner: root
    group: root
    mode: "0600"
  notify: apply netplan

- name: Check if Docker is already installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install prerequisites for APT over HTTPS
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: docker_check.rc != 0

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: docker_check.rc != 0

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: docker_check.rc != 0

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ arch_map[ansible_architecture] | default(ansible_architecture) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64
  when: docker_check.rc != 0

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  when: docker_check.rc != 0

- name: Ensure Docker service is running and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add SSH user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Allow DB and SSH ports from each client IP
  community.general.ufw:
    rule: allow
    src: "{{ item.1 }}"
    port: "{{ item.0 }}"
    proto: tcp
    comment: "NAS — port {{ item.0 }} from {{ item.1 }}"
  loop: "{{ nas_db_ports | product(nas_allowed_clients) | list }}"

- name: Enable UFW with default deny
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
