# infrastructure/nas-link-setup/setup.yml
---
- name: Configure Node1 USB-ethernet link to NAS
  hosts: node1
  become: true
  gather_facts: true
  roles:
    - nas-link-node1

- name: Configure NAS network and services
  hosts: nas
  become: true
  gather_facts: true
  roles:
    - nas-link-nas

- name: Add NAS subnet route on Node2
  hosts: node2
  become: true
  gather_facts: true
  roles:
    - nas-link-route
