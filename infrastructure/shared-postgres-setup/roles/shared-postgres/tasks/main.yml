# infrastructure/shared-postgres-setup/roles/shared-postgres/tasks/main.yml
---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create shared PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ shared_postgres_data_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Ensure local secrets directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.homelab-secrets/shared-postgres"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate superuser password (idempotent)
  ansible.builtin.set_fact:
    shared_postgres_superuser_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/shared-postgres/superuser_password chars=ascii_letters,digits length=64') }}"
  no_log: true

- name: Generate per-tenant passwords (idempotent)
  ansible.builtin.set_fact:
    "shared_postgres_{{ item.name }}_password": "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/shared-postgres/' + item.name + '_password chars=ascii_letters,digits length=64') }}"
  loop: "{{ shared_postgres_tenants }}"
  no_log: true

- name: Restrict local secret files to owner-only
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.homelab-secrets/shared-postgres/{{ item }}"
    mode: "0600"
  loop: >-
    {{ ['superuser_password'] + shared_postgres_tenants | map(attribute='name') | map('regex_replace', '^(.*)$', '\1_password') | list }}
  delegate_to: localhost
  become: false

- name: Create databases-net Docker network
  community.docker.docker_network:
    name: databases-net
    state: present

- name: Template init-databases.sh
  ansible.builtin.template:
    src: init-databases.sh.j2
    dest: "{{ shared_postgres_data_dir }}/init-databases.sh"
    mode: "0755"
    owner: root
    group: root
  no_log: true

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ shared_postgres_data_dir }}/docker-compose.yml"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Deploy shared PostgreSQL stack
  community.docker.docker_compose_v2:
    project_src: "{{ shared_postgres_data_dir }}"
    state: present
  no_log: true

- name: Wait for shared PostgreSQL to become ready
  ansible.builtin.command: >
    docker exec {{ shared_postgres_container_name }}
    pg_isready -U postgres
  register: pg_ready
  until: pg_ready.rc == 0
  retries: "{{ shared_postgres_health_check_retries }}"
  delay: "{{ shared_postgres_health_check_delay }}"
  changed_when: false

- name: Display shared PostgreSQL access information
  ansible.builtin.debug:
    msg: |
      Shared PostgreSQL is running at {{ inventory_hostname }}:{{ shared_postgres_port }}

      Superuser: postgres
      Tenants: {{ shared_postgres_tenants | map(attribute='name') | join(', ') }}

      Credentials stored in ~/.homelab-secrets/shared-postgres/
