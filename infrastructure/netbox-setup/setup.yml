---
# =============================================================================
# Netbox Setup
# =============================================================================
# Deploys Netbox (infrastructure documentation & IPAM) on a remote host
# via Docker Compose, and optionally integrates with the secure homelab stack
# (Cloudflare Tunnel + Caddy + Pi-hole + Homepage).
#
# Usage:
#   ansible-playbook infrastructure/netbox-setup/setup.yml \
#     -i infrastructure/netbox-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Netbox Setup Wizard
        ══════════════════════════════════════════════

        [1/4] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/4] SSH user for the target machine"
      private: false

    - name: netbox_admin_user
      prompt: "[3/4] Admin username"
      default: "admin"
      private: false

    - name: netbox_admin_email
      prompt: "[4/4] Admin email"
      default: "admin@localhost"
      private: false

  tasks:
    - name: Prompt for admin password
      ansible.builtin.pause:
        prompt: "Admin password"
        echo: false
      register: _netbox_admin_password_pause
      no_log: true

    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: netbox_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        netbox_admin_user: "{{ netbox_admin_user }}"
        netbox_admin_email: "{{ netbox_admin_email }}"
        netbox_admin_password: "{{ _netbox_admin_password_pause.user_input }}"
        netbox_bind_address: "{{ '127.0.0.1' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        netbox_public_url: >-
          {{
            'https://' + netbox_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      no_log: true

- name: Install Docker and deploy Netbox
  hosts: netbox_hosts
  become: true
  roles:
    - docker
    - netbox

- name: Integrate Netbox with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Netbox
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ netbox_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _netbox_cf_dns
          changed_when: _netbox_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Netbox to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} NETBOX"
            unsafe_writes: true
            block: |
              http://{{ netbox_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ netbox_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Netbox
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ netbox_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ netbox_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Netbox to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} NETBOX"
            insertafter: "- Infrastructure:"
            unsafe_writes: true
            block: |2
                  - Netbox:
                      icon: netbox.png
                      href: "https://{{ netbox_hostname }}.{{ saved_domain }}"
                      description: "Infrastructure documentation & IPAM"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ netbox_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
