---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Netbox data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  loop:
    - "{{ netbox_data_dir }}"
    - "{{ netbox_data_dir }}/media"
    - "{{ netbox_data_dir }}/reports"
    - "{{ netbox_data_dir }}/scripts"

- name: Ensure local secrets directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate and persist secrets (idempotent - written once, reused on re-runs)
  ansible.builtin.set_fact:
    netbox_db_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/netbox/db_password chars=ascii_letters,digits length=64') }}"
    netbox_secret_key: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/netbox/secret_key chars=ascii_letters,digits length=64') }}"
    netbox_redis_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/netbox/redis_password chars=ascii_letters,digits length=32') }}"
    netbox_redis_cache_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/netbox/redis_cache_password chars=ascii_letters,digits length=32') }}"
    netbox_api_token: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/netbox/api_token chars=hexdigits length=40') }}"
  no_log: true

- name: Restrict local secret files to owner-only
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0600"
  loop:
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox/db_password"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox/secret_key"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox/redis_password"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox/redis_cache_password"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/netbox/api_token"
  delegate_to: localhost
  become: false

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ netbox_data_dir }}/docker-compose.yml"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Deploy Netbox stack
  community.docker.docker_compose_v2:
    project_src: "{{ netbox_data_dir }}"
    state: present
  no_log: true

- name: Wait for Netbox to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ netbox_port }}"
    status_code: [200, 302]
  register: netbox_health
  until: netbox_health is not failed
  retries: "{{ netbox_health_check_retries }}"
  delay: "{{ netbox_health_check_delay }}"

- name: Display Netbox access information
  ansible.builtin.debug:
    msg: |
      Netbox is running at http://{{ inventory_hostname }}:{{ netbox_port }}

      Admin user:  {{ netbox_admin_user }}
      Admin email: {{ netbox_admin_email }}
      API token:   (stored in ~/.homelab-secrets/netbox/api_token)

      To put behind a reverse proxy, configure your proxy to forward
      to 127.0.0.1:{{ netbox_port }}.
