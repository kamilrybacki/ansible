---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Outline data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  loop:
    - "{{ outline_data_dir }}"
    - "{{ outline_data_dir }}/data"

- name: Ensure local secrets directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.homelab-secrets/outline"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate and persist secrets (idempotent - written once, reused on re-runs)
  ansible.builtin.set_fact:
    outline_db_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/outline/db_password chars=ascii_letters,digits length=64') }}"
    outline_secret_key: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/outline/secret_key chars=ascii_letters,digits length=64') }}"
    outline_utils_secret: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/outline/utils_secret chars=ascii_letters,digits length=64') }}"
    outline_redis_password: "{{ lookup('password', lookup('env', 'HOME') + '/.homelab-secrets/outline/redis_password chars=ascii_letters,digits length=32') }}"
  no_log: true

- name: Restrict local secret files to owner-only
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0600"
  loop:
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/outline/db_password"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/outline/secret_key"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/outline/utils_secret"
    - "{{ lookup('env', 'HOME') }}/.homelab-secrets/outline/redis_password"
  delegate_to: localhost
  become: false

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ outline_data_dir }}/docker-compose.yml"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Deploy Outline stack
  community.docker.docker_compose_v2:
    project_src: "{{ outline_data_dir }}"
    state: present
  no_log: true

- name: Wait for Outline to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ outline_port }}"
    status_code: [200, 302]
  register: outline_health
  until: outline_health is not failed
  retries: "{{ outline_health_check_retries }}"
  delay: "{{ outline_health_check_delay }}"

- name: Display Outline access information
  ansible.builtin.debug:
    msg: |
      Outline is running at http://{{ inventory_hostname }}:{{ outline_port }}

      Sign-in method: {{ 'OIDC (' + outline_oidc_display_name + ')' if outline_oidc_client_id | length > 0 else 'Email magic-link via SMTP' }}

      To put behind a reverse proxy, configure your proxy to forward
      to 127.0.0.1:{{ outline_port }}.
