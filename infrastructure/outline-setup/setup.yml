---
# =============================================================================
# Outline Setup
# =============================================================================
# Deploys Outline (wiki / knowledge base) on a remote host via Docker Compose,
# and optionally integrates with the secure homelab stack
# (Cloudflare Tunnel + Caddy + Pi-hole + Homepage).
#
# Authentication options (at least one required):
#   - Email magic-link: requires SMTP credentials
#   - OIDC:            integrates with Authelia or any OpenID Connect provider
#                      Authelia config: add an OIDC client for Outline (see README)
#
# Usage:
#   ansible-playbook infrastructure/outline-setup/setup.yml \
#     -i infrastructure/outline-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

- name: Gather host and auth details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Outline Wiki Setup Wizard
        ══════════════════════════════════════════════

        [1/9] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/9] SSH user for the target machine"
      private: false

    - name: outline_admin_email
      prompt: "[3/9] Admin email address"
      default: "admin@localhost"
      private: false

    # ── SMTP (leave blank to skip and use OIDC-only) ──────────────────────────
    - name: outline_smtp_host
      prompt: |
        [4/9] SMTP host for magic-link sign-in (leave blank to skip, use OIDC instead)
              e.g. smtp.gmail.com
      default: ""
      private: false

    - name: outline_smtp_username
      prompt: "[5/9] SMTP username (leave blank to skip)"
      default: ""
      private: false

    - name: outline_smtp_password
      prompt: "[6/9] SMTP password (leave blank to skip)"
      default: ""
      private: true

    # ── OIDC (leave blank to skip) ────────────────────────────────────────────
    - name: outline_oidc_client_id
      prompt: |
        [7/9] OIDC client ID (leave blank to skip)
              Authelia example: outline
      default: ""
      private: false

    - name: outline_oidc_client_secret
      prompt: "[8/9] OIDC client secret (leave blank to skip)"
      default: ""
      private: true

    - name: outline_oidc_base_url
      prompt: |
        [9/9] OIDC provider base URL (leave blank to skip)
              Authelia example: https://auth.yourdomain.com
      default: ""
      private: false

  tasks:
    - name: Validate at least one auth method is configured
      ansible.builtin.fail:
        msg: >
          You must configure at least one authentication method:
          either SMTP (for magic-link email sign-in) or OIDC.
          Re-run and fill in either the SMTP host or the OIDC client ID.
      when:
        - outline_smtp_host | length == 0
        - outline_oidc_client_id | length == 0

    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: outline_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        outline_admin_email: "{{ outline_admin_email }}"
        # SMTP
        outline_smtp_host: "{{ outline_smtp_host }}"
        outline_smtp_username: "{{ outline_smtp_username }}"
        outline_smtp_password: "{{ outline_smtp_password }}"
        outline_smtp_from_email: "{{ outline_smtp_username if outline_smtp_username | length > 0 else '' }}"
        outline_smtp_reply_to_email: "{{ outline_smtp_username if outline_smtp_username | length > 0 else '' }}"
        # OIDC
        outline_oidc_client_id: "{{ outline_oidc_client_id }}"
        outline_oidc_client_secret: "{{ outline_oidc_client_secret }}"
        outline_oidc_auth_uri: >-
          {{
            outline_oidc_base_url.rstrip('/') + '/api/oidc/authorization'
            if outline_oidc_base_url | length > 0 else ''
          }}
        outline_oidc_token_uri: >-
          {{
            outline_oidc_base_url.rstrip('/') + '/api/oidc/token'
            if outline_oidc_base_url | length > 0 else ''
          }}
        outline_oidc_userinfo_uri: >-
          {{
            outline_oidc_base_url.rstrip('/') + '/api/oidc/userinfo'
            if outline_oidc_base_url | length > 0 else ''
          }}
        # Reverse proxy / integration
        outline_bind_address: "{{ '127.0.0.1' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        saved_domain: "{{ hostvars['localhost']['saved_domain'] | default('') }}"
        outline_public_url: >-
          {{
            'https://' + outline_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      no_log: true

- name: Install Docker and deploy Outline
  hosts: outline_hosts
  become: true
  roles:
    - docker
    - outline

- name: Integrate Outline with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Outline
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ outline_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _outline_cf_dns
          changed_when: _outline_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Outline to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} OUTLINE"
            unsafe_writes: true
            block: |
              http://{{ outline_hostname }}.{{ saved_domain }} {
                import rate_limit
                import proxy_headers
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ outline_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Outline
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ outline_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ outline_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Outline to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} OUTLINE"
            insertafter: "- Infrastructure:"
            unsafe_writes: true
            block: |2
                  - Outline:
                      icon: outline.png
                      href: "https://{{ outline_hostname }}.{{ saved_domain }}"
                      description: "Wiki & knowledge base"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ outline_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
