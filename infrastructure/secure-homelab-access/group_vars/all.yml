---
# =============================================================================
# Secure Homelab Remote Access - Defaults
# =============================================================================
# These are sensible defaults for internal settings. User-facing values
# (IP, domain, passwords, email) are prompted interactively at runtime.
# Override any of these via extra-vars or inventory vars if needed.
# =============================================================================

# -- VPN Networking (internal) ------------------------------------------------
vpn_subnet: "10.8.0.0/24"
vpn_address: "10.8.0.1"

# -- Docker --------------------------------------------------------------------
docker_data_dir: "/opt/homelab"
docker_network_name: "homelab-net"
docker_network_subnet: "172.20.0.0/24"

# -- WireGuard (wg-easy) ------------------------------------------------------
wireguard_port: 51820
wireguard_web_port: 51821
wireguard_dns: "1.1.1.1,1.0.0.1"
wireguard_mtu: 1420
wireguard_persistent_keepalive: 25
wireguard_container_name: "wg-easy"
wireguard_data_dir: "{{ docker_data_dir }}/wireguard"

# -- Caddy (Reverse Proxy) ----------------------------------------------------
caddy_container_name: "caddy"
caddy_data_dir: "{{ docker_data_dir }}/caddy"

# -- Authelia (2FA) ------------------------------------------------------------
authelia_container_name: "authelia"
authelia_data_dir: "{{ docker_data_dir }}/authelia"

# -- Cockpit (System Management + Terminal) ------------------------------------
cockpit_port: 9090
cockpit_allow_unencrypted: true  # Safe: behind Caddy HTTPS + WireGuard VPN

# -- Homepage (Dashboard) -----------------------------------------------------
homepage_container_name: "homepage"
homepage_data_dir: "{{ docker_data_dir }}/homepage"

# -- Subdomain Prefixes -------------------------------------------------------
# Customize the subdomain used for each service (e.g. auth.example.com)
subdomain_auth: "auth"
subdomain_home: "home"
subdomain_cockpit: "cockpit"
subdomain_wireguard: "wg"

# -- Fail2ban ------------------------------------------------------------------
fail2ban_maxretry: 5
fail2ban_bantime: 86400
fail2ban_findtime: 600
