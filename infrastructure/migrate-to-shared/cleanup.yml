# infrastructure/migrate-to-shared/cleanup.yml
---
# Removes orphaned per-service database containers and volumes
# after successful migration to shared instances.
# Run ONLY after verifying all services work on shared databases.

- name: Clean up old per-service database containers
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: "Target host to clean up"
      default: "10.0.0.2"
      private: false
    - name: target_ssh_user
      prompt: "SSH user"
      default: "kamil"
      private: false
    - name: confirm_cleanup
      prompt: |

        ⚠️  WARNING: This will permanently remove old database containers
        and their volumes. Data will be LOST if not migrated.

        Type 'yes-delete-old-databases' to confirm
      private: false
  tasks:
    - name: Abort if not confirmed
      ansible.builtin.assert:
        that: confirm_cleanup == 'yes-delete-old-databases'
        msg: "Cleanup aborted — confirmation not received."

    - name: Add target host
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: cleanup_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3

- name: Remove old database containers and volumes
  hosts: cleanup_hosts
  become: true
  tasks:
    - name: Stop and remove old containers
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
      loop:
        - outline-postgres
        - outline-redis
        - netbox-postgres
        - netbox-redis
        - netbox-redis-cache
        - paperless-db
        - paperless-redis
        - seafile-db
        - librenms_db
        - librenms_redis
      failed_when: false

    - name: Remove old Docker volumes (names include compose project prefix)
      ansible.builtin.shell: |
        docker volume ls --filter "name={{ item }}" --format "{% raw %}{{.Name}}{% endraw %}" | xargs -r docker volume rm
      loop:
        - outline-postgres-data
        - outline-redis-data
        - netbox-postgres-data
        - netbox-redis-data
        - paperless-db-data
        - paperless-redis-data
        - seafile-db-data
        - librenms_db_data
      changed_when: true
      failed_when: false

    - name: Remove migration dump directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /opt/outline/migration
        - /opt/netbox/migration
        - /opt/paperless/migration
        - /opt/seafile/migration
        - /opt/librenms/migration

    - name: Cleanup complete
      ansible.builtin.debug:
        msg: "Old database containers and volumes have been removed."
