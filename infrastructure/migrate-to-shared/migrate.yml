# infrastructure/migrate-to-shared/migrate.yml
---
# One-time migration from per-service databases to shared instances.
# Run per-service: ansible-playbook migrate.yml --tags outline
# Or all at once: ansible-playbook migrate.yml

- name: Migrate service databases to shared instances
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: "Target host with running services"
      default: "10.0.0.2"
      private: false
    - name: target_ssh_user
      prompt: "SSH user"
      default: "kamil"
      private: false
  tasks:
    - name: Add target host
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: migration_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
      tags: always

- name: Run migrations
  hosts: migration_hosts
  become: true
  tasks:
    # ── Outline PostgreSQL ──
    - name: Migrate Outline PostgreSQL data
      tags: [outline]
      block:
        - name: Create Outline migration directory
          ansible.builtin.file:
            path: /opt/outline/migration
            state: directory
            mode: "0700"

        - name: Dump Outline database
          ansible.builtin.shell: >
            docker exec outline-postgres
            pg_dump -U outline outline
            > /opt/outline/migration/outline_dump.sql
          changed_when: true

        - name: Count Outline source rows
          ansible.builtin.shell: >
            docker exec outline-postgres
            psql -U outline -d outline -tAc
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';"
          register: _outline_src_count
          changed_when: false

        - name: Restore Outline into shared PostgreSQL
          ansible.builtin.shell: >
            docker exec -i shared-postgres
            psql -U postgres -d outline
            < /opt/outline/migration/outline_dump.sql
          changed_when: true

        - name: Reassign Outline ownership
          ansible.builtin.shell: >
            docker exec shared-postgres
            psql -U postgres -d outline -c
            "REASSIGN OWNED BY postgres TO outline;"
          changed_when: true

        - name: Count Outline target rows
          ansible.builtin.shell: >
            docker exec shared-postgres
            psql -U postgres -d outline -tAc
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';"
          register: _outline_tgt_count
          changed_when: false

        - name: Verify Outline migration
          ansible.builtin.assert:
            that: _outline_src_count.stdout | trim == _outline_tgt_count.stdout | trim
            msg: "Outline table count mismatch: source={{ _outline_src_count.stdout | trim }} target={{ _outline_tgt_count.stdout | trim }}"

    # ── Netbox PostgreSQL ──
    - name: Migrate Netbox PostgreSQL data
      tags: [netbox]
      block:
        - name: Create Netbox migration directory
          ansible.builtin.file:
            path: /opt/netbox/migration
            state: directory
            mode: "0700"

        - name: Dump Netbox database
          ansible.builtin.shell: >
            docker exec netbox-postgres
            pg_dump -U netbox netbox
            > /opt/netbox/migration/netbox_dump.sql
          changed_when: true

        - name: Restore Netbox into shared PostgreSQL
          ansible.builtin.shell: >
            docker exec -i shared-postgres
            psql -U postgres -d netbox
            < /opt/netbox/migration/netbox_dump.sql
          changed_when: true

        - name: Reassign Netbox ownership
          ansible.builtin.shell: >
            docker exec shared-postgres
            psql -U postgres -d netbox -c
            "REASSIGN OWNED BY postgres TO netbox;"
          changed_when: true

    # ── Paperless PostgreSQL ──
    - name: Migrate Paperless PostgreSQL data
      tags: [paperless]
      block:
        - name: Create Paperless migration directory
          ansible.builtin.file:
            path: /opt/paperless/migration
            state: directory
            mode: "0700"

        - name: Dump Paperless database
          ansible.builtin.shell: >
            docker exec paperless-db
            pg_dump -U paperless paperless
            > /opt/paperless/migration/paperless_dump.sql
          changed_when: true

        - name: Restore Paperless into shared PostgreSQL
          ansible.builtin.shell: >
            docker exec -i shared-postgres
            psql -U postgres -d paperless
            < /opt/paperless/migration/paperless_dump.sql
          changed_when: true

        - name: Reassign Paperless ownership
          ansible.builtin.shell: >
            docker exec shared-postgres
            psql -U postgres -d paperless -c
            "REASSIGN OWNED BY postgres TO paperless;"
          changed_when: true

    # ── Seafile MariaDB ──
    - name: Migrate Seafile MariaDB data
      tags: [seafile]
      block:
        - name: Load shared MariaDB root password
          ansible.builtin.set_fact:
            _shared_mariadb_root_pw: "{{ lookup('file', lookup('env', 'HOME') + '/.homelab-secrets/shared-mariadb/root_password') }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Load Seafile local DB root password
          ansible.builtin.set_fact:
            _seafile_local_root_pw: "{{ lookup('file', lookup('env', 'HOME') + '/.homelab-secrets/seafile/db_root_password') }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Create Seafile migration directory
          ansible.builtin.file:
            path: /opt/seafile/migration
            state: directory
            mode: "0700"

        - name: Dump Seafile databases
          ansible.builtin.shell: >
            docker exec seafile-db
            mysqldump -u root -p"{{ _seafile_local_root_pw }}"
            --databases ccnet_db seafile_db seahub_db
            > /opt/seafile/migration/seafile_dump.sql
          changed_when: true
          no_log: true

        - name: Restore Seafile into shared MariaDB
          ansible.builtin.shell: >
            docker exec -i shared-mariadb
            mysql -u root -p"{{ _shared_mariadb_root_pw }}"
            < /opt/seafile/migration/seafile_dump.sql
          changed_when: true
          no_log: true

    # ── LibreNMS MariaDB ──
    - name: Migrate LibreNMS MariaDB data
      tags: [librenms]
      block:
        - name: Load shared MariaDB root password
          ansible.builtin.set_fact:
            _shared_mariadb_root_pw: "{{ lookup('file', lookup('env', 'HOME') + '/.homelab-secrets/shared-mariadb/root_password') }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Load LibreNMS local DB password
          ansible.builtin.set_fact:
            _librenms_local_db_pw: "{{ lookup('file', lookup('env', 'HOME') + '/.homelab-secrets/librenms/db_password') }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Create LibreNMS migration directory
          ansible.builtin.file:
            path: /opt/librenms/migration
            state: directory
            mode: "0700"

        - name: Dump LibreNMS database
          ansible.builtin.shell: >
            docker exec librenms_db
            mysqldump -u root -p"root_{{ _librenms_local_db_pw }}"
            --databases librenms
            > /opt/librenms/migration/librenms_dump.sql
          changed_when: true
          no_log: true

        - name: Restore LibreNMS into shared MariaDB
          ansible.builtin.shell: >
            docker exec -i shared-mariadb
            mysql -u root -p"{{ _shared_mariadb_root_pw }}"
            < /opt/librenms/migration/librenms_dump.sql
          changed_when: true
          no_log: true

    # ── Dify PostgreSQL ──
    - name: Migrate Dify PostgreSQL data
      tags: [dify]
      block:
        - name: Create Dify migration directory
          ansible.builtin.file:
            path: /opt/dify/migration
            state: directory
            mode: "0700"

        - name: Load Dify DB password
          ansible.builtin.set_fact:
            _dify_local_db_pw: "{{ lookup('file', lookup('env', 'HOME') + '/.homelab-secrets/dify/db_password') | default('difyai123456') }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Find Dify postgres container name
          ansible.builtin.shell: >
            docker ps --filter "name=postgres" --filter "label=com.docker.compose.project.working_dir=/opt/dify/docker"
            --format "{{ '{{' }}.Names{{ '}}' }}" | head -1
          register: _dify_pg_container
          changed_when: false

        - name: Dump Dify database
          ansible.builtin.shell: >
            docker exec {{ _dify_pg_container.stdout | trim }}
            pg_dump -U postgres dify
            > /opt/dify/migration/dify_dump.sql
          changed_when: true

        - name: Restore Dify into shared PostgreSQL
          ansible.builtin.shell: >
            docker exec -i shared-postgres
            psql -U postgres -d dify
            < /opt/dify/migration/dify_dump.sql
          changed_when: true

        - name: Reassign Dify ownership
          ansible.builtin.shell: >
            docker exec shared-postgres
            psql -U postgres -d dify -c
            "REASSIGN OWNED BY postgres TO dify;"
          changed_when: true

    - name: Migration summary
      ansible.builtin.debug:
        msg: |
          Migration complete. Next steps:
          1. Re-deploy each service with its updated role (shared DB support)
          2. Verify each service works correctly
          3. Run cleanup.yml to remove old DB containers
