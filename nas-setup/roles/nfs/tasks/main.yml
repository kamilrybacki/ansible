---
- name: Install NFS server packages
  ansible.builtin.apt:
    name: "{{ nfs_server_packages }}"
    state: present
    update_cache: true
  become: true

- name: Deploy NFS exports configuration
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart nfs

- name: Enable and start NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started
  become: true

- name: Export all NFS shares
  ansible.builtin.command: exportfs -ra
  become: true
  changed_when: true
