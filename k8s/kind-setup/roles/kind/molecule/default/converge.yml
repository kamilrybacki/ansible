---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Install curl and gpg for APT key management
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
        state: present
        update_cache: true
  roles:
    - role: kind
