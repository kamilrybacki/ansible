---
- name: Check that kubectl is available
  ansible.builtin.command: kubectl version --client
  register: kubectl_check
  changed_when: false
  failed_when: kubectl_check.rc != 0

- name: Check that Helm is available
  ansible.builtin.command: helm version --short
  register: helm_check
  changed_when: false
  failed_when: helm_check.rc != 0

- name: Add Headlamp Helm repository
  ansible.builtin.command: helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
  changed_when: "'has been added' in _helm_repo.stdout"
  register: _helm_repo

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Create Headlamp namespace
  ansible.builtin.command: kubectl create namespace {{ headlamp_namespace }}
  register: _ns_create
  changed_when: _ns_create.rc == 0
  failed_when: _ns_create.rc != 0 and 'already exists' not in _ns_create.stderr

- name: Deploy Headlamp via Helm
  ansible.builtin.command: >-
    helm upgrade --install headlamp headlamp/headlamp
    --namespace {{ headlamp_namespace }}
    --version {{ headlamp_chart_version }}
    --set service.type={{ headlamp_service_type }}
    --set service.port={{ headlamp_port }}
    --wait --timeout 120s

- name: Wait for Headlamp pod to be ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=headlamp
    -n {{ headlamp_namespace }}
    --timeout=120s
  changed_when: false

- name: Create admin service account for Headlamp
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: headlamp-admin
        namespace: {{ headlamp_namespace }}
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: headlamp-admin
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
        - kind: ServiceAccount
          name: headlamp-admin
          namespace: {{ headlamp_namespace }}
  register: _sa_create
  changed_when: "'created' in _sa_create.stdout"

- name: Generate admin token
  ansible.builtin.command: >-
    kubectl create token headlamp-admin
    -n {{ headlamp_namespace }}
    --duration=87600h
  register: _headlamp_token
  changed_when: false

- name: Display Headlamp access information
  ansible.builtin.debug:
    msg: |
      Headlamp is deployed in the '{{ headlamp_namespace }}' namespace.

      To access Headlamp, run:
        kubectl port-forward -n {{ headlamp_namespace }} svc/headlamp {{ headlamp_port }}:{{ headlamp_port }}

      Then open http://localhost:{{ headlamp_port }}

      Login token:
        {{ _headlamp_token.stdout }}

      Save this token — you'll need it to log in.
