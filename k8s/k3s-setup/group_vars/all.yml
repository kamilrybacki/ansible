---
# K3s
k3s_version: "v1.32.3+k3s1"
k3s_node_ip: "192.168.0.107"
kubeconfig_local_path: "{{ lookup('env', 'HOME') }}/.kube/lw-c1.yaml"

# Helm
helm_version: "v3.16.4"

# k9s
k9s_version: "v0.32.7"

# ArgoCD
argocd_namespace: argocd
argocd_version: "v2.13.3"
argocd_port: 8443
argocd_nodeport: 30443
argocd_nodeport_http: 30080
argocd_health_check_retries: 20
argocd_health_check_delay: 10

# -- K8s Secrets (from Vault) ------------------------------------------------
# Ansible creates these before ArgoCD deploys the charts.
# Charts reference them via existingSecret.
k8s_secrets:
  - namespace: n8n
    name: n8n-worker-secrets
    vault_path: n8n-postgres
    data:
      DB_POSTGRESDB_PASSWORD: db_password
      N8N_ENCRYPTION_KEY: encryption_key
      QUEUE_BULL_REDIS_PASSWORD: redis_password

  - namespace: github-runners
    name: github-runner-secrets
    vault_path: github
    data:
      GITHUB_TOKEN: runner_pat

  - namespace: portkey
    name: portkey-secrets
    vault_path: portkey
    data:
      GROQ_API_KEY: groq_api_key
      OPENAI_API_KEY: nvidia_api_key
      DEEPSEEK_API_KEY: deepseek_api_key
      PORTKEY_API_KEY: portkey_api_key

  - namespace: mcp-bridges
    name: mcp-bridges-secrets
    vault_path: mcp-bridges
    data:
      obsidian_api_key: obsidian_api_key
      netbox_token: netbox_token
      vault_token: vault_token
      n8n_mcp_token: n8n_mcp_token
      grafana_sa_token: grafana_sa_token

  - namespace: hermes
    name: hermes-secrets
    vault_path: hermes
    data:
      portkey_gateway_key: portkey_gateway_key
      telegram_bot_token: telegram_bot_token
      n8n_mcp_token: n8n_mcp_token

  # distillery-secrets is managed by k8s/distillery-setup/setup.yml
  # (Vault stores all env vars; the playbook assembles the full secret including
  # Redis URL with password and in-cluster service URLs.)
  # Not listed here because the data shape is complex — handled by the setup playbook.

# -- OIDC secrets (created from Authelia secrets on control node) -------------
# These are NOT from Vault; they're injected at runtime from setup.yml facts.
headlamp_oidc_client_secret: ""  # Set at runtime via extra-vars
argocd_oidc_client_secret: ""    # Set at runtime via extra-vars
argocd_domain: "argocd.kamilandrzejrybacki.dpdns.org"
authelia_issuer_url: "https://auth.kamilandrzejrybacki.dpdns.org"

# -- ArgoCD Applications (Helm charts from chart repo) -----------------------
argocd_apps_repo: "https://github.com/kamilandrzejrybacki-inc/helm.git"
argocd_apps_target_revision: "main"

argocd_applications:
  - name: n8n-workers
    chart_path: charts/n8n-workers
    namespace: n8n
    values: {}

  - name: github-runners
    chart_path: charts/github-runners
    namespace: github-runners
    values: {}

  - name: headlamp
    chart_path: charts/headlamp
    namespace: headlamp
    values: {}
    helm_parameters:
      - { name: "config.oidc.clientID", value: "headlamp" }
      - { name: "config.oidc.issuerURL", value: "https://auth.{{ domain | default('kamilandrzejrybacki.dpdns.org') }}" }
      - { name: "config.oidc.scopes", value: "openid profile email groups" }

  - name: portkey
    chart_path: charts/portkey
    namespace: portkey
    values: {}

  - name: vcluster
    chart_path: charts/vcluster
    namespace: test
    values: {}

  - name: qdrant
    chart_path: charts/qdrant
    namespace: qdrant
    values: {}

  - name: distillery
    chart_path: charts/distillery
    namespace: distillery
    values: {}

  - name: mcp-bridges
    chart_path: charts/mcp-bridges
    namespace: mcp-bridges
    values: {}

  - name: hermes
    chart_path: charts/hermes
    namespace: hermes
    values: {}

  # k8s-monitoring is deployed directly from the Grafana Helm chart repo
  # (not via the git-based chart repo) because ArgoCD cannot apply the
  # large Prometheus Operator CRDs with client-side apply. The CRDs are
  # pre-installed with `kubectl apply --server-side` and the chart's
  # prometheus-operator-crds subchart is disabled.
  #
  # Managed via: /tmp/argocd-app-k8s-monitoring.yml (applied manually)
  # Source: https://grafana.github.io/helm-charts, chart: k8s-monitoring ~1.0
  # Namespace: monitoring
  # Key settings: opencost disabled, prometheus-operator-crds disabled,
  #   remote-write to Mimir/Loki on 10.0.1.2
