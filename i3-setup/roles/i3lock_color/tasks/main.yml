# i3-setup/roles/i3lock_color/tasks/main.yml
---
- name: Check if i3lock is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/i3lock
  register: i3lock_binary

- name: Clone i3lock-color repository
  ansible.builtin.git:
    repo: "https://github.com/Raymo111/i3lock-color.git"
    dest: /tmp/i3lock-color
    update: true
  when: not i3lock_binary.stat.exists

- name: Build i3lock-color — autogen
  ansible.builtin.command:
    cmd: ./autogen.sh
    chdir: /tmp/i3lock-color
  changed_when: true
  when: not i3lock_binary.stat.exists

- name: Build i3lock-color — configure
  ansible.builtin.command:
    cmd: ./configure
    chdir: /tmp/i3lock-color
  changed_when: true
  when: not i3lock_binary.stat.exists

- name: Build i3lock-color — make
  ansible.builtin.command:
    cmd: make
    chdir: /tmp/i3lock-color
  changed_when: true
  when: not i3lock_binary.stat.exists

- name: Install i3lock-color
  ansible.builtin.command:
    cmd: make install
    chdir: /tmp/i3lock-color
  become: true
  changed_when: true
  when: not i3lock_binary.stat.exists

- name: Clean up build directory
  ansible.builtin.file:
    path: /tmp/i3lock-color
    state: absent
  when: not i3lock_binary.stat.exists
