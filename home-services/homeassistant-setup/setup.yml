---
# Play 1: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: ha_host_ip
      prompt: "IP or hostname of the Home Assistant host"
      private: false

    - name: ha_ssh_user
      prompt: "SSH user for the Home Assistant host"
      private: false

    - name: ha_port_input
      prompt: "Home Assistant port"
      default: "8123"
      private: false

    - name: webhook_url
      prompt: "Webhook URL for alerts (Discord/Slack/n8n — leave blank to skip)"
      default: ""
      private: true

    - name: ping_hosts
      prompt: "Comma-separated list of hosts to ping-monitor (e.g. router:192.168.1.1,nas:192.168.1.50 — leave blank to skip)"
      default: ""
      private: false

    - name: n8n_url
      prompt: "n8n health URL to monitor (e.g. http://192.168.1.10:5678/healthz — leave blank to skip)"
      default: ""
      private: false

  tasks:
    - name: Build monitored services list
      ansible.builtin.set_fact:
        dynamic_services: []

    - name: Add n8n to monitored services
      ansible.builtin.set_fact:
        dynamic_services: "{{ dynamic_services + [{'name': 'n8n', 'type': 'http', 'url': n8n_url}] }}"
      when: n8n_url | length > 0

    - name: Add ping hosts to monitored services
      ansible.builtin.set_fact:
        dynamic_services: "{{ dynamic_services + [{'name': item.split(':')[0], 'type': 'ping', 'host': item.split(':')[1]}] }}"
      loop: "{{ ping_hosts.split(',') }}"
      when: ping_hosts | length > 0

    - name: Add HA host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ ha_host_ip }}"
        groups: ha_hosts
        ansible_user: "{{ ha_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        ha_port: "{{ ha_port_input }}"
        alert_webhook_url: "{{ webhook_url }}"
        monitored_services: "{{ dynamic_services }}"

# Play 2: Install Docker and deploy Home Assistant
- name: Deploy Home Assistant
  hosts: ha_hosts
  become: true
  roles:
    - docker
    - homeassistant

# Play 3: Configure monitoring, dashboards, and alerts
- name: Configure monitoring and alerts
  hosts: ha_hosts
  become: true
  roles:
    - monitoring
    - dashboard
    - alerts
