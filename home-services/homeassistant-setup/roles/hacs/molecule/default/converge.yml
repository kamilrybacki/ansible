---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Create mock HA config directory
      ansible.builtin.file:
        path: "{{ ha_config_dir }}"
        state: directory
        mode: "0755"

    - name: Install unzip (required for extraction)
      ansible.builtin.apt:
        name: unzip
        state: present
        update_cache: true
  roles:
    - role: hacs
