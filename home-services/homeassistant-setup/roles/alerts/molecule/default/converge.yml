---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Create mock HA config directory
      ansible.builtin.file:
        path: "{{ ha_config_dir }}"
        state: directory
        mode: "0755"

    - name: Create mock HA configuration.yaml
      ansible.builtin.copy:
        content: ""
        dest: "{{ ha_config_dir }}/configuration.yaml"
        mode: "0644"
  roles:
    - role: alerts
