---
# Dify Setup Playbook
# Deploys Dify – the open-source LLM application platform – via Docker Compose.
#
# Usage:
#   ansible-playbook home-services/dify-setup/setup.yml

# Play 1: Load saved homelab configuration (if available)
- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "dify"
      when: _vault_available | bool

# Play 2: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host
      prompt: "Target host IP/hostname (enter 'localhost' for this machine)"
      default: "localhost"
      private: false

    - name: target_user
      prompt: "SSH user for the target (ignored if localhost)"
      default: ""
      private: false

    - name: vector_store
      prompt: |

        Choose vector store backend:
          1) weaviate   – Default, general-purpose (recommended)
          2) qdrant     – High-performance, gRPC support
          3) pgvector   – PostgreSQL extension, no extra service
          4) chroma     – Lightweight, simple
        Enter vector store name
      default: "weaviate"
      private: false

    - name: enable_litellm
      prompt: |

        Deploy LiteLLM proxy? (Pools free-tier LLM providers with automatic failover)
          yes – Deploy alongside Dify (requires at least one provider API key)
          no  – Skip, configure model providers manually in Dify
        Enable LiteLLM (yes/no)
      default: "yes"
      private: false

    - name: litellm_key
      prompt: "Master key for LiteLLM (Dify authenticates with this)"
      default: "{{ hostvars['localhost']['_vault_secrets']['litellm_master_key'] | default('change-me-litellm-key') }}"
      private: true

    - name: groq_api_key
      prompt: "Groq API key (free at console.groq.com, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['groq_api_key'] | default('') }}"
      private: true

    - name: gemini_api_key
      prompt: "Google Gemini API key (free at aistudio.google.com, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['gemini_api_key'] | default('') }}"
      private: true

    - name: openrouter_api_key
      prompt: "OpenRouter API key (free at openrouter.ai, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['openrouter_api_key'] | default('') }}"
      private: true

    - name: cerebras_api_key
      prompt: "Cerebras API key (free at cloud.cerebras.ai, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['cerebras_api_key'] | default('') }}"
      private: true

    - name: dify_init_password
      prompt: "Dify admin password (max 30 chars, leave empty for auto)"
      default: "{{ hostvars['localhost']['_vault_secrets']['admin_password'] | default('') }}"
      private: true

  tasks:
    - name: Add target to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: dify_targets
        ansible_connection: ssh
        ansible_user: "{{ target_user }}"
        ansible_python_interpreter: /usr/bin/python3
        dify_vector_store: "{{ vector_store }}"
        dify_init_password: "{{ dify_init_password }}"
        litellm_enabled: "{{ enable_litellm | default('yes') | lower in ['yes', 'true', '1'] }}"
        litellm_master_key: "{{ litellm_key | default('change-me-litellm-key') }}"
        litellm_groq_api_key: "{{ groq_api_key | default('') }}"
        litellm_gemini_api_key: "{{ gemini_api_key | default('') }}"
        litellm_openrouter_api_key: "{{ openrouter_api_key | default('') }}"
        litellm_cerebras_api_key: "{{ cerebras_api_key | default('') }}"
        dify_public_url: >-
          {{
            'https://' + dify_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host != 'localhost'

    - name: Add target to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: dify_targets
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        dify_vector_store: "{{ vector_store }}"
        dify_init_password: "{{ dify_init_password }}"
        litellm_enabled: "{{ enable_litellm | default('yes') | lower in ['yes', 'true', '1'] }}"
        litellm_master_key: "{{ litellm_key | default('change-me-litellm-key') }}"
        litellm_groq_api_key: "{{ groq_api_key | default('') }}"
        litellm_gemini_api_key: "{{ gemini_api_key | default('') }}"
        litellm_openrouter_api_key: "{{ openrouter_api_key | default('') }}"
        litellm_cerebras_api_key: "{{ cerebras_api_key | default('') }}"
        dify_public_url: >-
          {{
            'https://' + dify_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host == 'localhost'

# Play 3: Provision Dify
- name: Provision Dify
  hosts: dify_targets
  gather_facts: true
  become: true
  roles:
    - prerequisites
    - litellm
    - dify

# Play 4: Store secrets to Vault (if available)
- name: Store Dify secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "dify"
        vault_secrets_data:
          litellm_master_key: "{{ hostvars[groups['dify_targets'][0]]['litellm_master_key'] | default('') }}"
          groq_api_key: "{{ hostvars[groups['dify_targets'][0]]['litellm_groq_api_key'] | default('') }}"
          gemini_api_key: "{{ hostvars[groups['dify_targets'][0]]['litellm_gemini_api_key'] | default('') }}"
          openrouter_api_key: "{{ hostvars[groups['dify_targets'][0]]['litellm_openrouter_api_key'] | default('') }}"
          cerebras_api_key: "{{ hostvars[groups['dify_targets'][0]]['litellm_cerebras_api_key'] | default('') }}"
          admin_password: "{{ hostvars[groups['dify_targets'][0]]['dify_init_password'] | default('') }}"
      when: _vault_available | default(false) | bool

# Play 5: Integrate with secure homelab
- name: Integrate Dify with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Dify
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ dify_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _dify_cf_dns
          changed_when: _dify_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Dify to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} DIFY"
            unsafe_writes: true
            block: |
              http://{{ dify_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ dify_http_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Dify
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ dify_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ dify_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Dify to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} DIFY"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - Dify:
                      icon: dify.png
                      href: "https://{{ dify_hostname }}.{{ saved_domain }}"
                      description: "LLM application platform"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ dify_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
