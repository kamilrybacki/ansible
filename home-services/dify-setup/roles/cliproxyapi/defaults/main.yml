---
# CLIProxyAPI version (GitHub release tag)
cliproxyapi_version: "latest"

# Install directory
cliproxyapi_install_dir: "/opt/cliproxyapi"

# Docker image
cliproxyapi_image: "eceasy/cli-proxy-api:latest"

# API port exposed on the host (OpenAI-compatible endpoint)
cliproxyapi_port: 8317

# API keys that clients (e.g. Dify) must present
cliproxyapi_api_keys:
  - "change-me-dify-key"

# Whether to enable the management control panel
cliproxyapi_management_enabled: false
cliproxyapi_management_secret: ""

# Claude provider settings
cliproxyapi_claude_enabled: true

# Request retry count
cliproxyapi_request_retry: 3

# Logging
cliproxyapi_debug: false
cliproxyapi_log_to_file: false

# Enable/disable the CLIProxyAPI deployment entirely
cliproxyapi_enabled: true
