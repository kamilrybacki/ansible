---
# Enable/disable the LiteLLM deployment entirely
litellm_enabled: true

# Install directory
litellm_install_dir: "/opt/litellm"

# Docker image
litellm_image: "ghcr.io/berriai/litellm:main-stable"

# Port exposed on the host (OpenAI-compatible endpoint)
litellm_port: 4000

# Master key for LiteLLM admin API and Dify authentication
litellm_master_key: "change-me-litellm-key"

# Routing strategy: simple-shuffle | least-busy | usage-based-routing-v2
# usage-based-routing-v2 is recommended for free tiers (respects RPM/TPM)
litellm_routing_strategy: "usage-based-routing-v2"

# Number of retries before failing over to next provider
litellm_num_retries: 2

# Cooldown time (seconds) for a provider after failure
litellm_cooldown_time: 60

# Provider API keys (leave empty to skip that provider)
litellm_groq_api_key: ""
litellm_gemini_api_key: ""
litellm_openrouter_api_key: ""
litellm_cerebras_api_key: ""

# Per-provider rate limits (RPM) — set conservatively to stay within free tiers
litellm_groq_rpm: 25
litellm_gemini_rpm: 8
litellm_openrouter_rpm: 18
litellm_cerebras_rpm: 25

# Embedding provider (gemini or openrouter)
litellm_embedding_provider: "gemini"
