---
# OpenClaw Setup Playbook
# Deploys OpenClaw with 4 cloud providers + optional Ollama local provider.
# Complexity-tiered routing: 90%+ traffic on free models, ~$0-5/month.
#
# Providers: NVIDIA NIM (free), Groq (free), Google Gemini (free),
#            DeepSeek (paid), Ollama (local, optional)
#
# Usage:
#   ansible-playbook home-services/openclaw-setup/setup.yml

# Play 1: Load saved homelab configuration (if available)
- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "openclaw"
      when: _vault_available | bool

# Play 2: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openclaw_hostname: "openclaw"
  vars_prompt:
    - name: target_host
      prompt: "Target host IP/hostname (enter 'localhost' for this machine)"
      default: "localhost"
      private: false

    - name: target_user
      prompt: "SSH user for the target (ignored if localhost)"
      default: ""
      private: false

    - name: nvidia_api_key
      prompt: |

        === Free providers ===
        NVIDIA NIM API key (free at build.nvidia.com — 6 models including Kimi K2.5, GLM-5, MiniMax M2.5)
        Leave empty to skip (or press Enter to use Vault value if available)
      default: "{{ hostvars['localhost']['_vault_secrets']['nvidia_api_key'] | default('') }}"
      private: true

    - name: groq_api_key
      prompt: "Groq API key (free at console.groq.com — fast Llama + Whisper audio, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['groq_api_key'] | default('') }}"
      private: true

    - name: gemini_api_key
      prompt: "Google Gemini API key (free at aistudio.google.dev — 1500 req/day, 1M context, leave empty to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['gemini_api_key'] | default('') }}"
      private: true

    - name: deepseek_api_key
      prompt: |

        === Paid provider ===
        DeepSeek API key (paid at platform.deepseek.com — $0.27-$2.20/1M tokens, leave empty to skip)
      default: "{{ hostvars['localhost']['_vault_secrets']['deepseek_api_key'] | default('') }}"
      private: true

    - name: enable_ollama
      prompt: |

        === Local provider ===
        Deploy Ollama as a local LLM provider? (Zero-cost, fully private, no API key needed)
          yes – Deploy Ollama sidecar alongside OpenClaw
          no  – Cloud providers only
        Enable Ollama (yes/no)
      default: "no"
      private: false

    - name: ollama_model
      prompt: |

        Ollama model to pull (ignored if Ollama is disabled):
          llama3.1:8b      – 8B params, ~5 GB  (default, good for most tasks)
          llama3.1:70b     – 70B params, ~40 GB (needs serious hardware)
          qwen2.5:14b      – 14B params, ~9 GB  (strong coding)
          deepseek-r1:8b   – 8B params, ~5 GB   (reasoning focused)
        Enter model tag
      default: "llama3.1:8b"
      private: false

    - name: enable_gpu
      prompt: "Enable NVIDIA GPU passthrough for Ollama? (yes/no, ignored if Ollama disabled)"
      default: "no"
      private: false

  tasks:
    - name: Validate at least one provider key is configured
      ansible.builtin.assert:
        that:
          - >-
            (nvidia_api_key | default('') | length > 0) or
            (groq_api_key | default('') | length > 0) or
            (gemini_api_key | default('') | length > 0) or
            (deepseek_api_key | default('') | length > 0) or
            (enable_ollama | default('no') | lower in ['yes', 'true', '1'])
        fail_msg: >-
          At least one provider must be configured.
          Provide an API key for NVIDIA NIM, Groq, Gemini, or DeepSeek,
          or enable Ollama for local inference.

    - name: Add target to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: openclaw_targets
        ansible_connection: ssh
        ansible_user: "{{ target_user }}"
        ansible_python_interpreter: /usr/bin/python3
        openclaw_nvidia_api_key: "{{ nvidia_api_key | default('') }}"
        openclaw_groq_api_key: "{{ groq_api_key | default('') }}"
        openclaw_gemini_api_key: "{{ gemini_api_key | default('') }}"
        openclaw_deepseek_api_key: "{{ deepseek_api_key | default('') }}"
        openclaw_ollama_enabled: "{{ enable_ollama | default('no') | lower in ['yes', 'true', '1'] }}"
        openclaw_ollama_model: "{{ ollama_model | default('llama3.1:8b') }}"
        openclaw_ollama_gpu_enabled: "{{ enable_gpu | default('no') | lower in ['yes', 'true', '1'] }}"
        openclaw_primary_model: >-
          {{
            'nvidia/kimi-k2.5' if nvidia_api_key | default('') | length > 0
            else ('groq/llama-3.3-70b-versatile' if groq_api_key | default('') | length > 0
            else ('google/gemini-2.5-flash' if gemini_api_key | default('') | length > 0
            else ('deepseek/deepseek-chat' if deepseek_api_key | default('') | length > 0
            else 'ollama/' + ollama_model | default('llama3.1:8b'))))
          }}
        openclaw_public_url: >-
          {{
            'https://' + openclaw_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host != 'localhost'

    - name: Add target to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: openclaw_targets
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        openclaw_nvidia_api_key: "{{ nvidia_api_key | default('') }}"
        openclaw_groq_api_key: "{{ groq_api_key | default('') }}"
        openclaw_gemini_api_key: "{{ gemini_api_key | default('') }}"
        openclaw_deepseek_api_key: "{{ deepseek_api_key | default('') }}"
        openclaw_ollama_enabled: "{{ enable_ollama | default('no') | lower in ['yes', 'true', '1'] }}"
        openclaw_ollama_model: "{{ ollama_model | default('llama3.1:8b') }}"
        openclaw_ollama_gpu_enabled: "{{ enable_gpu | default('no') | lower in ['yes', 'true', '1'] }}"
        openclaw_primary_model: >-
          {{
            'nvidia/kimi-k2.5' if nvidia_api_key | default('') | length > 0
            else ('groq/llama-3.3-70b-versatile' if groq_api_key | default('') | length > 0
            else ('google/gemini-2.5-flash' if gemini_api_key | default('') | length > 0
            else ('deepseek/deepseek-chat' if deepseek_api_key | default('') | length > 0
            else 'ollama/' + ollama_model | default('llama3.1:8b'))))
          }}
        openclaw_public_url: >-
          {{
            'https://' + openclaw_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host == 'localhost'

# Play 3: Provision OpenClaw
- name: Provision OpenClaw
  hosts: openclaw_targets
  gather_facts: true
  become: true
  roles:
    - prerequisites
    - openclaw

# Play 4: Store secrets to Vault (if available)
- name: Store OpenClaw secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "openclaw"
        vault_secrets_data:
          nvidia_api_key: "{{ hostvars[groups['openclaw_targets'][0]]['openclaw_nvidia_api_key'] | default('') }}"
          groq_api_key: "{{ hostvars[groups['openclaw_targets'][0]]['openclaw_groq_api_key'] | default('') }}"
          gemini_api_key: "{{ hostvars[groups['openclaw_targets'][0]]['openclaw_gemini_api_key'] | default('') }}"
          deepseek_api_key: "{{ hostvars[groups['openclaw_targets'][0]]['openclaw_deepseek_api_key'] | default('') }}"
      when: _vault_available | default(false) | bool

# Play 5: Integrate with secure homelab
- name: Integrate OpenClaw with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host'] }}"
    openclaw_hostname: "openclaw"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for OpenClaw
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ openclaw_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _openclaw_cf_dns
          changed_when: _openclaw_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add OpenClaw to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} OPENCLAW"
            unsafe_writes: true
            block: |
              http://{{ openclaw_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ openclaw_gateway_port | default(18789) }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for OpenClaw
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ openclaw_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ openclaw_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add OpenClaw to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} OPENCLAW"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - OpenClaw:
                      icon: openclaw.png
                      href: "https://{{ openclaw_hostname }}.{{ saved_domain }}"
                      description: "AI agent framework"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ openclaw_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
