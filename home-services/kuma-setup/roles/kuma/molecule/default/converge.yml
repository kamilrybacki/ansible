---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Install pip
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: true
    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name: docker
        state: present
  tasks:
    - name: Include kuma role tasks (skip docker dependency)
      ansible.builtin.include_tasks:
        file: ../../tasks/main.yml
