---
- name: Create Seafile compose directory
  ansible.builtin.file:
    path: "{{ seafile_compose_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ seafile_compose_dir }}/docker-compose.yml"
    mode: "0600"
    owner: root
    group: root
  become: true

- name: Start Seafile stack with Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ seafile_compose_dir }}"
  changed_when: true

- name: Wait for Seafile to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ seafile_port }}"
    status_code: [200, 301, 302]
  register: seafile_health
  until: seafile_health is not failed
  retries: "{{ seafile_health_check_retries }}"
  delay: "{{ seafile_health_check_delay }}"

- name: Display Seafile access information
  ansible.builtin.debug:
    msg:
      - "Seafile is running at http://localhost:{{ seafile_port }}"
      - "Admin email: {{ seafile_admin_email }}"
      - "Data stored at: {{ seafile_data_path }}"
