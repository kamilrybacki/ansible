---
- name: Get latest ha-bambulab release info
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ bambulab_repo }}/releases/latest"
    method: GET
    return_content: true
    headers:
      Accept: application/vnd.github.v3+json
  register: bambulab_release

- name: Set release download URL
  ansible.builtin.set_fact:
    bambulab_zip_url: "{{ bambulab_release.json.zipball_url }}"
    bambulab_version: "{{ bambulab_release.json.tag_name }}"

- name: Create custom_components directory
  ansible.builtin.file:
    path: "{{ ha_config_dir }}/custom_components"
    state: directory
    mode: "0755"

- name: Download ha-bambulab release zip
  ansible.builtin.get_url:
    url: "{{ bambulab_zip_url }}"
    dest: /tmp/bambulab.zip
    mode: "0644"

- name: Extract ha-bambulab zip to temporary location
  ansible.builtin.unarchive:
    src: /tmp/bambulab.zip
    dest: /tmp/
    remote_src: true
  register: bambulab_extract

- name: Find extracted directory
  ansible.builtin.find:
    paths: /tmp
    patterns: "greghesp-ha-bambulab-*"
    file_type: directory
  register: bambulab_extracted_dir

- name: Create bambu_lab target directory
  ansible.builtin.file:
    path: "{{ ha_config_dir }}/custom_components/bambu_lab"
    state: directory
    mode: "0755"

- name: Copy bambu_lab integration files
  ansible.builtin.copy:
    src: "{{ bambulab_extracted_dir.files[0].path }}/custom_components/bambu_lab/"
    dest: "{{ ha_config_dir }}/custom_components/bambu_lab/"
    remote_src: true
    mode: "0644"

- name: Remove temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/bambulab.zip
    - "{{ bambulab_extracted_dir.files[0].path }}"

- name: Restart Home Assistant to load ha-bambulab
  community.docker.docker_container:
    name: "{{ ha_container_name }}"
    state: started
    restart: true

- name: Wait for Home Assistant to restart
  ansible.builtin.uri:
    url: "http://localhost:{{ ha_port }}"
    method: GET
    status_code: 200
  register: ha_bambulab_check
  until: ha_bambulab_check.status == 200
  retries: 30
  delay: 10

- name: Display ha-bambulab post-install instructions
  ansible.builtin.debug:
    msg: |
      ha-bambulab {{ bambulab_version }} installed!
      Complete setup in the Home Assistant UI:
        1. Go to Settings → Devices & Services
        2. Click + Add Integration and search for "Bambu Lab"
        3. Select Cloud connection mode
        4. Enter your BambuLab account email and password
        5. Select Global region
        6. Choose your printer from the list
      Dashboard will populate automatically after the integration is configured.
