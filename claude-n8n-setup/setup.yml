---
# Play 1: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: n8n_host_ip
      prompt: "IP or hostname of the n8n host machine"
      private: false

    - name: n8n_ssh_user
      prompt: "SSH user for the n8n host"
      private: false

    - name: claude_host_ip
      prompt: "IP or hostname of the Claude Code client (enter 'localhost' if this machine)"
      default: "localhost"
      private: false

    - name: claude_ssh_user
      prompt: "SSH user for the Claude Code client (ignored if localhost)"
      default: ""
      private: false

    - name: mcp_bearer_token
      prompt: "Bearer token for n8n MCP auth (leave blank to auto-generate)"
      default: ""
      private: true

    - name: n8n_mcp_path
      prompt: "n8n MCP endpoint path, e.g. /mcp/<id> (leave blank to configure later via n8n UI)"
      default: ""
      private: false

  tasks:
    - name: Generate bearer token if not provided
      ansible.builtin.set_fact:
        mcp_token: >-
          {{ mcp_bearer_token if mcp_bearer_token != ''
             else lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=48') }}

    - name: Add n8n host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ n8n_host_ip }}"
        groups: n8n_hosts
        ansible_user: "{{ n8n_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        mcp_token: "{{ mcp_token }}"

    - name: Add Claude Code client to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ claude_host_ip }}"
        groups: claude_clients
        ansible_user: "{{ claude_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        n8n_host_ip: "{{ n8n_host_ip }}"
        n8n_port: "{{ n8n_port }}"
        mcp_token: "{{ mcp_token }}"
        n8n_mcp_path: "{{ n8n_mcp_path }}"
      when: claude_host_ip != 'localhost'

    - name: Add Claude Code client to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: claude_clients
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        n8n_host_ip: "{{ n8n_host_ip }}"
        n8n_port: "{{ n8n_port }}"
        mcp_token: "{{ mcp_token }}"
        n8n_mcp_path: "{{ n8n_mcp_path }}"
      when: claude_host_ip == 'localhost'

# Play 2: Install Docker and deploy n8n on the remote host
- name: Install Docker and run n8n
  hosts: n8n_hosts
  become: true
  roles:
    - docker
    - n8n

# Play 3: Configure Claude Code MCP on the client machine
- name: Configure Claude Code MCP integration
  hosts: claude_clients
  roles:
    - claude_mcp
