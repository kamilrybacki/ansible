---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Docker volume for n8n data
  community.docker.docker_volume:
    name: "{{ n8n_volume_name }}"
    state: present

- name: Start n8n container
  community.docker.docker_container:
    name: "{{ n8n_container_name }}"
    image: "{{ n8n_image }}"
    state: started
    restart_policy: "{{ n8n_restart_policy }}"
    published_ports:
      - "{{ n8n_port }}:5678"
    volumes:
      - "{{ n8n_volume_name }}:/home/node/.n8n"

- name: Wait for n8n to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}"
    status_code: [200, 302]
  register: n8n_health
  until: n8n_health is not failed
  retries: "{{ n8n_health_check_retries }}"
  delay: "{{ n8n_health_check_delay }}"

- name: Display n8n access information
  ansible.builtin.debug:
    msg: |
      n8n is running at http://{{ inventory_hostname }}:{{ n8n_port }}

      Next steps:
        1. Open the URL above in a browser and complete the initial n8n setup.
        2. Go to Settings > MCP and enable the MCP server.
        3. Copy the MCP endpoint path (e.g. /mcp/<id>).
        4. In the MCP authentication settings, configure a Header Auth
           credential with header name "Authorization" and value
           "Bearer {{ mcp_token }}".

      Your bearer token is: {{ mcp_token }}
      (Save this — you will need it for the n8n MCP auth configuration.)
