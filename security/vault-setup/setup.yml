---
# Vault Setup Playbook
# Deploys HashiCorp Vault as the centralized secrets store for all homelab playbooks.
#
# After deployment, other playbooks automatically detect Vault via ~/.vault-ansible.yml
# and use it to load/store secrets instead of prompting or using plaintext files.
#
# Usage:
#   ansible-playbook security/vault-setup/setup.yml

# Play 1: Load saved homelab configuration (if available)
- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

# Play 2: Gather connection details
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_hostname: "vault"
  vars_prompt:
    - name: target_host
      prompt: "Target host IP/hostname (enter 'localhost' for this machine)"
      default: "localhost"
      private: false

    - name: target_user
      prompt: "SSH user for the target (ignored if localhost)"
      default: ""
      private: false

    - name: storage_backend
      prompt: |

        Vault storage backend:
          file – Simple file storage (recommended for single node)
          raft – Integrated Raft storage (HA-capable, for clusters)
        Enter backend name
      default: "file"
      private: false

    - name: auto_unseal
      prompt: |

        Auto-unseal on restart? (Stores unseal keys on disk – convenient but less secure)
          yes – Auto-unseal (recommended for homelab)
          no  – Manual unseal required after each restart
        Enable auto-unseal (yes/no)
      default: "yes"
      private: false

  tasks:
    - name: Add target to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: vault_targets
        ansible_connection: ssh
        ansible_user: "{{ target_user }}"
        ansible_python_interpreter: /usr/bin/python3
        vault_storage_backend: "{{ storage_backend | default('file') }}"
        vault_auto_unseal: "{{ auto_unseal | default('yes') | lower in ['yes', 'true', '1'] }}"
        vault_public_url: >-
          {{
            'https://' + vault_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host != 'localhost'

    - name: Add target to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: vault_targets
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        vault_storage_backend: "{{ storage_backend | default('file') }}"
        vault_auto_unseal: "{{ auto_unseal | default('yes') | lower in ['yes', 'true', '1'] }}"
        vault_public_url: >-
          {{
            'https://' + vault_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      when: target_host == 'localhost'

# Play 3: Provision Vault
- name: Provision Vault
  hosts: vault_targets
  gather_facts: true
  become: true
  roles:
    - prerequisites
    - vault

# Play 4: Integrate with secure homelab
- name: Integrate Vault with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host'] }}"
    vault_hostname: "vault"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Vault
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ vault_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _vault_cf_dns
          changed_when: _vault_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Vault to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} VAULT"
            unsafe_writes: true
            block: |
              http://{{ vault_hostname }}.{{ saved_domain }} {
                import rate_limit
                import authelia
                reverse_proxy http://{{ _target_host_ip }}:{{ vault_port | default(8200) }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Vault
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ vault_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ vault_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Vault to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} VAULT"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - Vault:
                      icon: vault.png
                      href: "https://{{ vault_hostname }}.{{ saved_domain }}"
                      description: "Secrets management"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ vault_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
