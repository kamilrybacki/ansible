---
- name: Disable systemd-resolved stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "^#?DNSStubListener="
    line: "DNSStubListener=no"
    backup: true
  notify: Restart systemd-resolved

- name: Flush handlers to apply resolved changes
  ansible.builtin.meta: flush_handlers

- name: Symlink resolv.conf to systemd-resolved
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true

- name: Create Pi-hole data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pihole_data_dir }}/etc-pihole"
    - "{{ pihole_data_dir }}/etc-dnsmasq.d"

- name: Deploy Pi-hole container
  community.docker.docker_container:
    name: "{{ pihole_container_name }}"
    image: "{{ pihole_image }}"
    state: started
    restart_policy: unless-stopped
    env:
      WEBPASSWORD: "{{ pihole_password }}"
      PIHOLE_DNS_: "{{ pihole_upstream_dns }}"
      DNSMASQ_LISTENING: "all"
    volumes:
      - "{{ pihole_data_dir }}/etc-pihole:/etc/pihole"
      - "{{ pihole_data_dir }}/etc-dnsmasq.d:/etc/dnsmasq.d"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "{{ pihole_web_port }}:80/tcp"
    networks:
      - name: "{{ docker_network_name }}"
        ipv4_address: "{{ pihole_dns_ip }}"
  no_log: true

- name: Wait for Pi-hole to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ pihole_web_port }}/admin/"
    status_code: [200, 302]
  register: pihole_health
  until: pihole_health is not failed
  retries: "{{ pihole_health_check_retries }}"
  delay: "{{ pihole_health_check_delay }}"

- name: Remove Pi-hole web password (Authelia handles access control)
  community.docker.docker_container_exec:
    container: "{{ pihole_container_name }}"
    command: pihole -a -p ""
  changed_when: false

- name: Get Caddy container IP on homelab-net
  community.docker.docker_container_info:
    name: "{{ caddy_container_name | default('caddy') }}"
  register: _caddy_info

- name: Write wildcard DNS override for internal homelab access
  ansible.builtin.copy:
    dest: "{{ pihole_data_dir }}/etc-dnsmasq.d/99-homelab-internal.conf"
    content: |
      # Resolve all homelab subdomains to Caddy directly within Docker.
      # This lets containers (e.g. Lightpanda) bypass Cloudflare Tunnel
      # and hit Caddy at its internal Docker IP, enabling Authelia bypass.
      address=/.{{ domain }}/{{ _caddy_info.container.NetworkSettings.Networks[docker_network_name].IPAddress }}
    mode: "0644"
  notify: Restart Pi-hole DNS

- name: Add adlists to Pi-hole gravity database
  community.docker.docker_container_exec:
    container: "{{ pihole_container_name }}"
    command: >-
      sqlite3 /etc/pihole/gravity.db
      "INSERT OR IGNORE INTO adlist (address, enabled, comment)
       VALUES ('{{ item.url }}', 1, '{{ item.comment }}')"
  loop: "{{ pihole_adlists }}"
  register: pihole_adlist_result
  changed_when: pihole_adlist_result.rc == 0

- name: Update Pi-hole gravity (pull and compile blocklists)
  community.docker.docker_container_exec:
    container: "{{ pihole_container_name }}"
    command: pihole updateGravity
  async: 300
  poll: 10
  changed_when: true

- name: Deploy Pi-hole Prometheus exporter
  community.docker.docker_container:
    name: "{{ pihole_exporter_container_name }}"
    image: "{{ pihole_exporter_image }}"
    state: started
    restart_policy: unless-stopped
    env:
      PIHOLE_HOSTNAME: "{{ pihole_container_name }}"
    ports:
      - "{{ pihole_exporter_port }}:{{ pihole_exporter_port }}"
    networks:
      - name: "{{ docker_network_name }}"
  when: pihole_exporter_enabled | bool
