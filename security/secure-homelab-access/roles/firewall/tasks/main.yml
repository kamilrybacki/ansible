---
- name: Install UFW
  ansible.builtin.apt:
    name: "{{ ufw_packages }}"
    state: present
    update_cache: true

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow UDP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_allowed_udp_ports }}"

- name: Allow traffic from VPN subnet
  community.general.ufw:
    rule: allow
    from_ip: "{{ vpn_subnet }}"
    comment: "Allow all traffic from WireGuard VPN clients"

- name: Enable UFW
  community.general.ufw:
    state: enabled
