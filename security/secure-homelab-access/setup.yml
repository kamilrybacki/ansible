---
# =============================================================================
# Secure Homelab Remote Access
# =============================================================================
# Deploys a full secure remote access stack:
#   WireGuard VPN → Caddy (HTTPS) → Authelia (2FA) → Services
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup.yml
#   ansible-playbook -i inventory/hosts.ini setup.yml --tags wireguard,caddy
#
# Target host and SSH user are prompted at runtime — no need to edit hosts.ini.
#
# All critical values are prompted interactively at runtime.
# Previously entered values are loaded from ~/.homelab-setup-vars.yml and
# offered as defaults so re-runs only require pressing Enter.
# Sensible defaults for ports, subnets, etc. live in group_vars/all.yml.
# =============================================================================

- name: Load saved configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check if previous setup vars exist
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _setup_vars_stat

    - name: Load previous setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _setup_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "infrastructure"
      when: _vault_available | bool

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Secure Homelab Remote Access - Setup Wizard
        ══════════════════════════════════════════════

        [1/14] IP or hostname of the target machine
      default: "{{ hostvars['localhost']['saved_target_host'] | default('') }}"
      private: false

    - name: target_ssh_user
      prompt: "[2/14] SSH user for the target machine"
      default: "{{ hostvars['localhost']['saved_ssh_user'] | default('') }}"
      private: false

  tasks:
    - name: Validate host and user are not empty
      ansible.builtin.fail:
        msg: >-
          Prompt [{{ item.num }}] cannot be empty — please re-run and enter a value.
      when: not item.value
      loop:
        - { num: "1/11", value: "{{ target_host_ip }}" }
        - { num: "2/11", value: "{{ target_ssh_user }}" }
      tags: [always]

    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: homelab
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        ansible_connection: "{{ 'local' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else 'ssh' }}"
        _saved_target_host: "{{ target_host_ip }}"
        _saved_ssh_user: "{{ target_ssh_user }}"
      tags: [always]

- name: Secure Homelab Remote Access Setup
  hosts: homelab
  become: true

  vars_prompt:
    # -- Networking --
    - name: prompt_public_ip
      prompt: "[3/14] What is your public IP address?"
      default: "{{ hostvars['localhost']['saved_public_ip'] | default('') }}"
      private: false

    - name: prompt_domain
      prompt: |
        [4/14] What domain will you use? (e.g. homelab.example.com)
               DNS records for *.domain should point to your VPN address.
               You can also use <your-ip>.nip.io for testing without DNS
      default: "{{ hostvars['localhost']['saved_domain'] | default('') }}"
      private: false

    - name: prompt_ssh_port
      prompt: "[5/14] SSH port"
      default: "{{ hostvars['localhost']['saved_ssh_port'] | default('22') }}"
      private: false

    - name: prompt_caddy_email
      prompt: "[6/14] Email for Let's Encrypt certificate notifications"
      default: "{{ hostvars['localhost']['saved_caddy_email'] | default('') }}"
      private: false

    # -- WireGuard --
    - name: prompt_wireguard_password
      prompt: "[7/14] WireGuard admin UI password (for managing VPN peers)"
      default: "{{ hostvars['localhost']['_vault_secrets']['wireguard_password'] | default(hostvars['localhost']['saved_wireguard_password'] | default('')) }}"
      private: true
      confirm: true

    # -- Authelia --
    - name: prompt_authelia_user
      prompt: "[8/14] Authelia admin username"
      default: "{{ hostvars['localhost']['saved_authelia_user'] | default('admin') }}"
      private: false

    - name: prompt_authelia_password
      prompt: "[9/14] Authelia admin password (will be hashed with bcrypt)"
      default: "{{ hostvars['localhost']['_vault_secrets']['authelia_password'] | default(hostvars['localhost']['saved_authelia_password'] | default('')) }}"
      private: true
      confirm: true

    - name: prompt_authelia_email
      prompt: "[10/14] Authelia admin email (for notifications and recovery)"
      default: "{{ hostvars['localhost']['saved_authelia_email'] | default('') }}"
      private: false

    # -- Pi-hole --
    - name: prompt_pihole_password
      prompt: "[11/14] Pi-hole admin password (for DNS dashboard)"
      default: "{{ hostvars['localhost']['_vault_secrets']['pihole_password'] | default(hostvars['localhost']['saved_pihole_password'] | default('')) }}"
      private: true
      confirm: true

    # -- Cloudflare (optional) --
    - name: prompt_cloudflare_token
      prompt: |
        [12/14] Cloudflare API token (optional — press Enter to skip)
               When provided: enables wildcard TLS certs via DNS-01 challenge.
               Create at: dash.cloudflare.com → My Profile → API Tokens
               Required permissions: Zone / DNS / Edit
      default: "{{ hostvars['localhost']['_vault_secrets']['cloudflare_token'] | default(hostvars['localhost']['saved_cloudflare_token'] | default('')) }}"
      private: true

    # -- Cloudflare Tunnel (optional) --
    - name: prompt_cf_tunnel_name
      prompt: |
        [13/14] Cloudflare Tunnel name (optional — press Enter to skip)
               Creates a zero-trust tunnel: no open inbound ports, real IP hidden.
               Requires a domain managed by Cloudflare.
               Leave blank to use direct port forwarding instead.
      default: "{{ hostvars['localhost']['saved_cf_tunnel_name'] | default('') }}"
      private: false

    - name: prompt_cf_tunnel_id
      prompt: |
        [14/14] Cloudflare Tunnel ID (leave blank if creating a new tunnel)
               If you already ran 'cloudflared tunnel create', paste the UUID here.
               Otherwise leave blank — the playbook will create it for you.
      default: "{{ hostvars['localhost']['saved_cf_tunnel_id'] | default('') }}"
      private: false

  pre_tasks:
    - name: Validate required prompts are not empty
      ansible.builtin.fail:
        msg: >-
          Prompt [{{ item.num }}] cannot be empty — please re-run and enter a value.
      when: not item.value
      loop:
        - { num: "3/12",  value: "{{ prompt_public_ip }}" }
        - { num: "4/12",  value: "{{ prompt_domain }}" }
        - { num: "6/12",  value: "{{ prompt_caddy_email }}" }
        - { num: "7/12",  value: "{{ prompt_wireguard_password }}" }
        - { num: "9/12",  value: "{{ prompt_authelia_password }}" }
        - { num: "11/12", value: "{{ prompt_pihole_password }}" }
      tags: [always]

    - name: Set prompted values as facts
      ansible.builtin.set_fact:
        public_ip: "{{ prompt_public_ip }}"
        domain: "{{ prompt_domain }}"
        ssh_port: "{{ prompt_ssh_port }}"
        caddy_email: "{{ prompt_caddy_email }}"
        wireguard_password: "{{ prompt_wireguard_password }}"
        authelia_default_user: "{{ prompt_authelia_user }}"
        authelia_default_email: "{{ prompt_authelia_email }}"
        pihole_password: "{{ prompt_pihole_password }}"
        cloudflare_api_token: "{{ prompt_cloudflare_token }}"
        cf_tunnel_name: "{{ prompt_cf_tunnel_name }}"
        cf_tunnel_id: "{{ prompt_cf_tunnel_id }}"
      no_log: true
      tags: [always]

    - name: Set Authelia password hash
      ansible.builtin.set_fact:
        authelia_default_password_hash: "{{ prompt_authelia_password | password_hash('bcrypt') }}"
      no_log: true
      tags: [always]

    - name: Ensure Authelia secrets directory exists
      ansible.builtin.file:
        path: "{{ authelia_data_dir }}/secrets"
        state: directory
        mode: "0700"
        owner: root
        group: root
      tags: [always]

    - name: Check if Authelia secrets already exist
      ansible.builtin.stat:
        path: "{{ authelia_data_dir }}/secrets/storage_encryption_key"
      register: _authelia_secrets_stat
      tags: [always]

    - name: Generate Authelia secrets (first run only)
      ansible.builtin.shell: |
        python3 -c "
        import secrets, string
        chars = string.ascii_letters + string.digits
        for _ in range(3):
            print(''.join(secrets.choice(chars) for _ in range(64)))
        "
      register: _authelia_secrets_raw
      changed_when: true
      no_log: true
      when: not _authelia_secrets_stat.stat.exists
      tags: [always]

    - name: Write Authelia secrets to final location (first run only)
      ansible.builtin.copy:
        content: "{{ item.value }}"
        dest: "{{ authelia_data_dir }}/secrets/{{ item.key }}"
        owner: root
        group: root
        mode: "0600"
      loop:
        - { key: jwt_secret,              value: "{{ _authelia_secrets_raw.stdout_lines[0] }}" }
        - { key: session_secret,          value: "{{ _authelia_secrets_raw.stdout_lines[1] }}" }
        - { key: storage_encryption_key,  value: "{{ _authelia_secrets_raw.stdout_lines[2] }}" }
      no_log: true
      when: not _authelia_secrets_stat.stat.exists
      tags: [always]

    - name: Load existing Authelia secrets
      ansible.builtin.slurp:
        src: "{{ authelia_data_dir }}/secrets/{{ item }}"
      register: _authelia_secrets_slurp
      loop:
        - jwt_secret
        - session_secret
        - storage_encryption_key
      no_log: true
      tags: [always]

    - name: Set Authelia secrets as facts
      ansible.builtin.set_fact:
        authelia_jwt_secret: "{{ _authelia_secrets_slurp.results[0].content | b64decode | trim }}"
        authelia_session_secret: "{{ _authelia_secrets_slurp.results[1].content | b64decode | trim }}"
        authelia_storage_encryption_key: "{{ _authelia_secrets_slurp.results[2].content | b64decode | trim }}"
      no_log: true
      tags: [always]

    - name: Save credentials to file
      ansible.builtin.copy:
        content: |
          # Homelab credentials — generated by Ansible
          # Source this file or keep it somewhere safe.

          export WIREGUARD_PASSWORD="{{ wireguard_password }}"
          export AUTHELIA_USER="{{ authelia_default_user }}"
          export AUTHELIA_PASSWORD="{{ prompt_authelia_password }}"
          export AUTHELIA_EMAIL="{{ authelia_default_email }}"
          export PIHOLE_PASSWORD="{{ pihole_password }}"

          # Cloudflare (optional)
          export CF_API_TOKEN="{{ cloudflare_api_token }}"

          # Auto-generated Authelia secrets (backup copy)
          export AUTHELIA_JWT_SECRET="{{ authelia_jwt_secret }}"
          export AUTHELIA_SESSION_SECRET="{{ authelia_session_secret }}"
          export AUTHELIA_STORAGE_KEY="{{ authelia_storage_encryption_key }}"
        dest: "{{ lookup('env', 'HOME') }}/.homelab-credentials"
        owner: "{{ lookup('env', 'USER') }}"
        mode: "0600"
      no_log: true
      become: false
      tags: [always]

    - name: Save setup vars for future runs
      ansible.builtin.copy:
        content: |
          # Homelab setup vars — loaded automatically as prompt defaults on next run
          # Edit or delete this file to change defaults.
          saved_target_host: "{{ _saved_target_host }}"
          saved_ssh_user: "{{ _saved_ssh_user }}"
          saved_public_ip: "{{ public_ip }}"
          saved_domain: "{{ domain }}"
          saved_ssh_port: "{{ ssh_port }}"
          saved_caddy_email: "{{ caddy_email }}"
          saved_wireguard_password: "{{ wireguard_password }}"
          saved_authelia_user: "{{ authelia_default_user }}"
          saved_authelia_password: "{{ prompt_authelia_password }}"
          saved_authelia_email: "{{ authelia_default_email }}"
          saved_pihole_password: "{{ pihole_password }}"
          saved_cloudflare_token: "{{ cloudflare_api_token }}"
          saved_cf_tunnel_name: "{{ cf_tunnel_name }}"
          saved_cf_tunnel_id: "{{ cf_tunnel_id }}"
        dest: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
        owner: "{{ lookup('env', 'USER') }}"
        mode: "0600"
      no_log: true
      become: false
      tags: [always]

    - name: Store infrastructure secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "infrastructure"
        vault_secrets_data:
          wireguard_password: "{{ wireguard_password }}"
          authelia_user: "{{ authelia_default_user }}"
          authelia_password: "{{ prompt_authelia_password }}"
          authelia_email: "{{ authelia_default_email }}"
          pihole_password: "{{ pihole_password }}"
          cloudflare_token: "{{ cloudflare_api_token }}"
      when: hostvars['localhost']['_vault_available'] | default(false) | bool
      tags: [always]

    - name: Update firewall ports from prompted SSH port
      ansible.builtin.set_fact:
        firewall_allowed_tcp_ports:
          - "{{ ssh_port }}"
          - "53"
          - "{{ wireguard_web_port }}"
        firewall_allowed_udp_ports:
          - "{{ wireguard_port }}"
          - "53"
      tags: [always]

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: "{{ _summary.split('\n') }}"
      vars:
        _summary: |
          ══════════════════════════════════════════════
            Deployment Plan
          ══════════════════════════════════════════════
            Public IP:    {{ public_ip }}
            Domain:       {{ domain }}
            SSH Port:     {{ ssh_port }}
            VPN Port:     {{ wireguard_port }}/UDP
            VPN Subnet:   {{ vpn_subnet }}
            Data Dir:     {{ docker_data_dir }}

            Services:
              {{ subdomain_auth }}.{{ domain }}     → Authelia 2FA portal
              {{ subdomain_home }}.{{ domain }}     → Homepage dashboard
              {{ subdomain_cockpit }}.{{ domain }}  → System management + terminal
              {{ subdomain_wireguard }}.{{ domain }} → WireGuard peer management
              {{ subdomain_pihole }}.{{ domain }}   → Pi-hole DNS dashboard

            Auth user:    {{ authelia_default_user }}
            Secrets:      auto-generated (jwt, session, encryption key)
            CrowdSec:     enabled (rate-limit + threat intelligence)
            Cloudflare:   {{ 'enabled (DNS-01 TLS + DDoS protection)' if cloudflare_api_token | default('') else 'disabled (no token provided)' }}
            CF Tunnel:    {{ 'enabled → ' + cf_tunnel_name if cf_tunnel_name | default('') else 'disabled (direct port forwarding)' }}
          ══════════════════════════════════════════════
      tags: [always]

    - name: Confirm deployment
      ansible.builtin.pause:
        prompt: "Press ENTER to deploy, or Ctrl+C to abort"
      tags: [always]

  roles:
    - role: firewall
      tags: [firewall, security]

    - role: fail2ban
      tags: [fail2ban, security]

    - role: docker
      tags: [docker]

    - role: pihole
      tags: [pihole, dns]

    - role: wireguard
      tags: [wireguard, vpn]

    - role: crowdsec
      tags: [crowdsec, security]

    - role: cloudflared
      tags: [cloudflared, tunnel]
      when: cf_tunnel_name | default('') != ''

    - role: authelia
      tags: [authelia, auth]

    - role: caddy
      tags: [caddy, proxy]

    - role: cockpit
      tags: [cockpit, terminal]

    - role: homepage
      tags: [homepage, dashboard]

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg: "{{ _done.split('\n') }}"
      vars:
        _done: |
          ══════════════════════════════════════════════
            Deployment Complete!
          ══════════════════════════════════════════════

          1. Bootstrap WireGuard (before VPN is active):
             http://{{ public_ip }}:{{ wireguard_web_port }}
             → Log in → Add peer → Download config → Connect

          2. Once connected via VPN, access services at:
             https://{{ subdomain_auth }}.{{ domain }}    → Authelia 2FA (set up first)
             https://{{ subdomain_home }}.{{ domain }}    → Dashboard
             https://{{ subdomain_cockpit }}.{{ domain }} → Terminal & system mgmt
             https://{{ subdomain_wireguard }}.{{ domain }} → VPN peer management
             https://{{ subdomain_pihole }}.{{ domain }}  → DNS / ad-blocking

          3. DNS: Point *.{{ domain }} → {{ vpn_address }}
             (via Pi-hole, /etc/hosts, or your DNS provider)
          ══════════════════════════════════════════════
