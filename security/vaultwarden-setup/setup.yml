---
# =============================================================================
# Vaultwarden Setup
# =============================================================================
# Deploys Vaultwarden (self-hosted Bitwarden) on a remote host via Docker.
#
# Usage:
#   ansible-playbook security/vaultwarden-setup/setup.yml \
#     -i security/vaultwarden-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "vaultwarden"
      when: _vault_available | bool

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Vaultwarden Setup Wizard
        ══════════════════════════════════════════════

        [1/7] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/7] SSH user for the target machine"
      private: false

    - name: vaultwarden_admin_token
      prompt: "[3/7] Admin token for the /admin panel"
      default: "{{ hostvars['localhost']['_vault_secrets']['admin_token'] | default('') }}"
      private: true
      confirm: true

    - name: smtp_provider
      prompt: |-
        [4/7] SMTP provider (leave blank to skip email setup)
               gmail    → smtp.gmail.com:587       (use an App Password)
               outlook  → smtp-mail.outlook.com:587
               zoho     → smtp.zoho.com:587
               fastmail → smtp.fastmail.com:587
               sendgrid → smtp.sendgrid.net:587     (username = apikey)
               mailgun  → smtp.mailgun.org:587
               ses      → email-smtp.us-east-1.amazonaws.com:587
               custom   → enter host/port manually
      default: ""
      private: false

    - name: smtp_from
      prompt: "[5/7] From address (e.g. vault@gmail.com, leave blank to skip)"
      default: ""
      private: false

    - name: smtp_username
      prompt: "[6/7] SMTP username"
      default: ""
      private: false

    - name: smtp_password
      prompt: "[7/7] SMTP password / app password / API key"
      default: "{{ hostvars['localhost']['_vault_secrets']['smtp_password'] | default('') }}"
      private: true

    - name: smtp_host_custom
      prompt: "SMTP host (only for 'custom' provider)"
      default: ""
      private: false

    - name: smtp_port_custom
      prompt: "SMTP port (only for 'custom' provider)"
      default: "587"
      private: false

  tasks:
    - name: Resolve SMTP settings from provider
      ansible.builtin.set_fact:
        _smtp_host: "{{ _providers[smtp_provider | lower]['host'] | default(smtp_host_custom) }}"
        _smtp_port: "{{ _providers[smtp_provider | lower]['port'] | default(smtp_port_custom) }}"
        _smtp_security: "{{ _providers[smtp_provider | lower]['security'] | default('starttls') }}"
      vars:
        _providers:
          gmail:    { host: smtp.gmail.com,                              port: "587", security: starttls }
          outlook:  { host: smtp-mail.outlook.com,                      port: "587", security: starttls }
          zoho:     { host: smtp.zoho.com,                              port: "587", security: starttls }
          fastmail: { host: smtp.fastmail.com,                          port: "587", security: starttls }
          sendgrid: { host: smtp.sendgrid.net,                          port: "587", security: starttls }
          mailgun:  { host: smtp.mailgun.org,                           port: "587", security: starttls }
          ses:      { host: email-smtp.us-east-1.amazonaws.com,         port: "587", security: starttls }
          custom:   { host: "{{ smtp_host_custom }}", port: "{{ smtp_port_custom }}", security: starttls }
      when: smtp_provider | length > 0

    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: vaultwarden_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        vaultwarden_admin_token: "{{ vaultwarden_admin_token }}"
        vaultwarden_bind_address: "{{ '127.0.0.1' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        vaultwarden_public_url: >-
          {{
            'https://' + vaultwarden_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
        vaultwarden_smtp_host: "{{ hostvars['localhost']['_smtp_host'] | default('') }}"
        vaultwarden_smtp_port: "{{ hostvars['localhost']['_smtp_port'] | default('') }}"
        vaultwarden_smtp_security: "{{ hostvars['localhost']['_smtp_security'] | default('') }}"
        vaultwarden_smtp_from: "{{ smtp_from }}"
        vaultwarden_smtp_username: "{{ smtp_username }}"
        vaultwarden_smtp_password: "{{ smtp_password }}"
      no_log: true

- name: Store Vaultwarden secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "vaultwarden"
        vault_secrets_data:
          admin_token: "{{ hostvars[groups['vaultwarden_hosts'][0]]['vaultwarden_admin_token'] | default('') }}"
          smtp_password: "{{ hostvars[groups['vaultwarden_hosts'][0]]['vaultwarden_smtp_password'] | default('') }}"
      when: _vault_available | default(false) | bool

- name: Install Docker and deploy Vaultwarden
  hosts: vaultwarden_hosts
  become: true
  roles:
    - docker
    - vaultwarden

- name: Integrate Vaultwarden with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Vaultwarden
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ vaultwarden_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _vw_cf_dns
          changed_when: _vw_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Vaultwarden to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} VAULTWARDEN"
            unsafe_writes: true
            block: |
              http://{{ vaultwarden_hostname }}.{{ saved_domain }} {
                import rate_limit
                reverse_proxy http://{{ _target_host_ip }}:{{ vaultwarden_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Vaultwarden
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ vaultwarden_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ vaultwarden_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Vaultwarden to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} VAULTWARDEN"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - Vaultwarden:
                      icon: bitwarden.png
                      href: "https://{{ vaultwarden_hostname }}.{{ saved_domain }}"
                      description: "Password manager"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ vaultwarden_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
