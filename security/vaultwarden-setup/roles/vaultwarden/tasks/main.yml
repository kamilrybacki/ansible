---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Vaultwarden data directory
  ansible.builtin.file:
    path: "{{ vaultwarden_data_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Use admin token as-is (must be pre-hashed argon2id or plaintext)
  ansible.builtin.set_fact:
    _vw_hashed_token: "{{ vaultwarden_admin_token }}"
  no_log: true

- name: Start Vaultwarden container
  community.docker.docker_container:
    name: "{{ vaultwarden_container_name }}"
    image: "{{ vaultwarden_image }}"
    state: started
    restart_policy: "{{ vaultwarden_restart_policy }}"
    env: "{{ _vw_base_env | combine(_vw_smtp_env) }}"
    published_ports:
      - "{{ vaultwarden_bind_address }}:{{ vaultwarden_port }}:80"
    volumes:
      - "{{ vaultwarden_data_dir }}:/data"
  vars:
    _vw_base_env:
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "{{ _vw_hashed_token }}"
      ROCKET_PORT: "80"
      DOMAIN: "{{ vaultwarden_public_url | default('') }}"
    _vw_smtp_env: >-
      {{
        {
          'SMTP_HOST':     vaultwarden_smtp_host,
          'SMTP_PORT':     vaultwarden_smtp_port,
          'SMTP_SECURITY': vaultwarden_smtp_security,
          'SMTP_FROM':     vaultwarden_smtp_from,
          'SMTP_USERNAME': vaultwarden_smtp_username,
          'SMTP_PASSWORD': vaultwarden_smtp_password
        }
        if vaultwarden_smtp_host | default('') | length > 0
        else {}
      }}
  no_log: true

- name: Patch config.json domain to match public URL
  ansible.builtin.shell: |
    cfg="{{ vaultwarden_data_dir }}/config.json"
    url="{{ vaultwarden_public_url | default('') }}"
    [ -z "$url" ] && exit 0
    [ -f "$cfg" ] || echo '{}' > "$cfg"
    python3 -c "
    import json, sys
    with open('$cfg') as f: c = json.load(f)
    if c.get('domain') != '$url':
        c['domain'] = '$url'
        with open('$cfg', 'w') as f: json.dump(c, f, indent=2)
        print('CHANGED')
    "
  register: _vw_config_patch
  changed_when: "'CHANGED' in _vw_config_patch.stdout"
  notify: restart vaultwarden

- name: Wait for Vaultwarden to become reachable
  ansible.builtin.uri:
    url: "http://localhost:{{ vaultwarden_port }}"
    status_code: [200, 302]
  register: vw_health
  until: vw_health is not failed
  retries: "{{ vaultwarden_health_check_retries }}"
  delay: "{{ vaultwarden_health_check_delay }}"

- name: Display Vaultwarden access information
  ansible.builtin.debug:
    msg: |
      Vaultwarden is running at http://{{ inventory_hostname }}:{{ vaultwarden_port }}

      Admin panel: http://{{ inventory_hostname }}:{{ vaultwarden_port }}/admin
      Public registration is disabled. Create accounts via the admin panel.

      To put behind a reverse proxy, configure your proxy to forward
      to 127.0.0.1:{{ vaultwarden_port }}.
