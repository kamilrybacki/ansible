---
- name: Install Cockpit packages
  ansible.builtin.apt:
    name: "{{ cockpit_packages }}"
    state: present
    update_cache: true

- name: Configure Cockpit to allow unencrypted connections (behind Caddy TLS)
  ansible.builtin.copy:
    dest: /etc/cockpit/cockpit.conf
    content: |
      [WebService]
      AllowUnencrypted={{ cockpit_allow_unencrypted | lower }}
      Origins=https://cockpit.{{ domain }}
    mode: "0644"
  notify: restart cockpit

- name: Ensure Cockpit is started and enabled
  ansible.builtin.systemd:
    name: cockpit.socket
    state: started
    enabled: true
