---
- name: Skip Caddy setup if no domain configured
  when: caddy_domain | length == 0
  block:
    - name: Notify skipping HTTPS
      ansible.builtin.debug:
        msg: "No domain configured — skipping Caddy reverse proxy. Access Seafile directly at http://localhost:{{ seafile_port }}"

    - name: End role early
      ansible.builtin.meta: end_role

- name: Create Caddy config directory
  ansible.builtin.file:
    path: "{{ caddy_config_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_dir }}/Caddyfile"
    mode: "0644"
  become: true

- name: Start Caddy container
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ caddy_container_name }}
      --network host
      --restart unless-stopped
      -v {{ caddy_config_dir }}/Caddyfile:/etc/caddy/Caddyfile:ro
      -v caddy-data:/data
      -v caddy-config:/config
      {{ caddy_image }}
  register: caddy_start
  changed_when: caddy_start.rc == 0
  failed_when: caddy_start.rc != 0

- name: Display HTTPS access information
  ansible.builtin.debug:
    msg:
      - "Caddy reverse proxy is running"
      - "Seafile is accessible at https://{{ caddy_domain }}"
      - "TLS certificates are managed automatically by Caddy"
