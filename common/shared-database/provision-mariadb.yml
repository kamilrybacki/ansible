# common/shared-database/provision-mariadb.yml
---
# Provisions database(s) and user on the shared MariaDB instance.
# Caller sets:
#   mariadb_databases – list of database names to create
#   mariadb_user      – username to create
#   mariadb_password  – password for the user
#
# Requires: _shared_mariadb_root_password (set by detect.yml)

- name: Install PyMySQL for MariaDB provisioning
  ansible.builtin.apt:
    name: python3-pymysql
    state: present
  become: true

- name: Create databases on shared MariaDB
  community.mysql.mysql_db:
    name: "{{ item }}"
    login_host: "{{ shared_db_host }}"
    login_port: "{{ shared_mariadb_port }}"
    login_user: "root"
    login_password: "{{ _shared_mariadb_root_password }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
  loop: "{{ mariadb_databases }}"
  no_log: true

- name: Create user on shared MariaDB
  community.mysql.mysql_user:
    name: "{{ mariadb_user }}"
    password: "{{ mariadb_password }}"
    login_host: "{{ shared_db_host }}"
    login_port: "{{ shared_mariadb_port }}"
    login_user: "root"
    login_password: "{{ _shared_mariadb_root_password }}"
    host: "%"
    priv: "{{ mariadb_databases | map('regex_replace', '(.*)', '\\1.*:ALL') | join('/') }}"
    state: present
  no_log: true

- name: Report MariaDB provisioning
  ansible.builtin.debug:
    msg: "Provisioned databases {{ mariadb_databases }} with user '{{ mariadb_user }}' on shared MariaDB ({{ shared_db_host }}:{{ shared_mariadb_port }})"
