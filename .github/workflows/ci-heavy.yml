---
name: CI - Heavy

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'security/**'
      - 'monitoring/**'

permissions:
  contents: read

jobs:
  discover-privileged:
    name: Discover privileged roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_roles: ${{ steps.discover.outputs.has_roles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover privileged roles
        id: discover
        run: ./scripts/discover-roles.sh privileged >> "$GITHUB_OUTPUT"

  discover-qemu:
    name: Discover QEMU roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_roles: ${{ steps.discover.outputs.has_roles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover QEMU roles
        id: discover
        run: ./scripts/discover-roles.sh qemu >> "$GITHUB_OUTPUT"

  test-roles-privileged:
    name: "Test (privileged): ${{ matrix.role_name }}"
    needs: discover-privileged
    if: needs.discover-privileged.outputs.has_roles == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover-privileged.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule (privileged Docker)
        working-directory: ${{ matrix.role_path }}
        env:
          SCENARIO: ${{ matrix.scenario }}
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "true"
        run: molecule test -s "$SCENARIO"

  test-roles-qemu:
    name: "Test (QEMU): ${{ matrix.role_name }}"
    needs: discover-qemu
    if: needs.discover-qemu.outputs.has_roles == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.discover-qemu.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Cache QEMU cloud image
        uses: actions/cache@v4
        with:
          path: /tmp/molecule-qemu/
          key: qemu-ubuntu2404-${{ github.run_id }}
          restore-keys: qemu-ubuntu2404-

      - name: Run Molecule (QEMU)
        working-directory: ${{ matrix.role_path }}
        env:
          SCENARIO: ${{ matrix.scenario }}
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "true"
        run: molecule test -s "$SCENARIO"
