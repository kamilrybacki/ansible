---
name: CI - Heavy

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'infrastructure/**'

jobs:
  discover-privileged:
    name: Discover privileged roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_roles: ${{ steps.check.outputs.has_roles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover privileged roles
        id: discover
        run: ./scripts/discover-roles.sh privileged >> "$GITHUB_OUTPUT"

      - name: Check if any roles found
        id: check
        run: |
          MATRIX='${{ steps.discover.outputs.matrix }}'
          if echo "$MATRIX" | grep -q '"role_path"'; then
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_roles=false" >> "$GITHUB_OUTPUT"
          fi

  discover-qemu:
    name: Discover QEMU roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_roles: ${{ steps.check.outputs.has_roles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover QEMU roles
        id: discover
        run: ./scripts/discover-roles.sh qemu >> "$GITHUB_OUTPUT"

      - name: Check if any roles found
        id: check
        run: |
          MATRIX='${{ steps.discover.outputs.matrix }}'
          if echo "$MATRIX" | grep -q '"role_path"'; then
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_roles=false" >> "$GITHUB_OUTPUT"
          fi

  test-roles-privileged:
    name: "Test (privileged): ${{ matrix.role_name }}"
    needs: discover-privileged
    if: needs.discover-privileged.outputs.has_roles == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover-privileged.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule (privileged Docker)
        working-directory: ${{ matrix.role_path }}
        run: molecule test -s ${{ matrix.scenario }}

  test-roles-qemu:
    name: "Test (QEMU): ${{ matrix.role_name }}"
    needs: discover-qemu
    if: needs.discover-qemu.outputs.has_roles == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover-qemu.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Cache QEMU cloud image
        uses: actions/cache@v4
        with:
          path: ~/.cache/molecule-qemu/
          key: qemu-ubuntu2404-${{ hashFiles('requirements-test.txt') }}

      - name: Run Molecule (QEMU)
        working-directory: ${{ matrix.role_path }}
        run: molecule test -s ${{ matrix.scenario }}

  discover-integration:
    name: Discover integration scenarios
    runs-on: ubuntu-latest
    outputs:
      has_scenarios: ${{ steps.check.outputs.has_scenarios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for integration scenarios
        id: check
        run: |
          if find . -path "*/molecule/integration" -type d | grep -q .; then
            echo "has_scenarios=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scenarios=false" >> "$GITHUB_OUTPUT"
          fi

  test-playbooks:
    name: "Integration: ${{ matrix.playbook.name }}"
    needs: [test-roles-privileged, test-roles-qemu, discover-integration]
    if: always() && !failure() && !cancelled() && needs.discover-integration.outputs.has_scenarios == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        playbook:
          - name: secure-homelab-access
            path: infrastructure/secure-homelab-access
          - name: nas-setup
            path: infrastructure/nas-setup
          - name: homeassistant-setup
            path: home-services/homeassistant-setup
          - name: k8s-full-setup
            path: k8s/k8s-full-setup
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run playbook integration test
        working-directory: ${{ matrix.playbook.path }}
        run: molecule test -s integration
