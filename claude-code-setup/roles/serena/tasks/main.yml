---
- name: Check if uv is available
  ansible.builtin.command: which uv
  register: uv_check
  changed_when: false
  failed_when: false

- name: Check if pipx is available
  ansible.builtin.command: which pipx
  register: pipx_check
  changed_when: false
  failed_when: false
  when: uv_check.rc != 0

- name: Install pipx via apt
  become: true
  ansible.builtin.apt:
    name: pipx
    state: present
    update_cache: true
  when:
    - uv_check.rc != 0
    - pipx_check.rc != 0

- name: Ensure pipx path is configured
  ansible.builtin.command: pipx ensurepath
  register: pipx_ensurepath_result
  changed_when: "'added' in pipx_ensurepath_result.stdout or 'modified' in pipx_ensurepath_result.stdout"
  when: uv_check.rc != 0

- name: Install uv via pipx
  ansible.builtin.command: "pipx install uv=={{ uv_version }}"
  register: pipx_uv_result
  changed_when: "'installed package' in pipx_uv_result.stdout"
  failed_when:
    - pipx_uv_result.rc != 0
    - "'already seems to be installed' not in (pipx_uv_result.stderr | default(''))"
  when: uv_check.rc != 0

- name: Verify uv installation
  ansible.builtin.command: uv --version
  register: uv_version_result
  changed_when: false

- name: Display uv version
  ansible.builtin.debug:
    msg: "uv version: {{ uv_version_result.stdout }}"

- name: Ensure Serena config directory exists
  ansible.builtin.file:
    path: "{{ serena_config_dir }}"
    state: directory
    mode: "0755"

- name: Copy Serena configuration
  ansible.builtin.copy:
    src: serena/serena_config.yml
    dest: "{{ serena_config_dir }}/serena_config.yml"
    mode: "0644"
