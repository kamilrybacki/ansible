---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create OpenClaw install directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}"
    state: directory
    mode: "0700"

- name: Create OpenClaw data directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}/data"
    state: directory
    mode: "0700"

- name: Create OpenClaw home directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}/openclaw-home"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0700"

- name: Write OpenClaw config (providers + gateway + auth)
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ openclaw_install_dir }}/openclaw-home/openclaw.json"
    owner: "1000"
    group: "1000"
    mode: "0600"
  no_log: true
  notify: Restart openclaw

- name: Create Ollama data directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}/ollama-data"
    state: directory
    mode: "0755"
  when: openclaw_ollama_enabled

- name: Write OpenClaw docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ openclaw_install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart openclaw

- name: Write systemd environment file for API keys
  ansible.builtin.template:
    src: openclaw.conf.j2
    dest: "/etc/openclaw.env"
    mode: "0600"
  no_log: true

- name: Start OpenClaw with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_install_dir }}"
    state: present

- name: Wait for Ollama to become reachable
  ansible.builtin.uri:
    url: "http://{{ openclaw_bind_address }}:11434/api/tags"
    status_code: [200]
  register: ollama_health
  until: ollama_health is not failed
  retries: 18
  delay: 10
  when: openclaw_ollama_enabled

- name: Pull Ollama model for OpenClaw
  ansible.builtin.command:
    cmd: "docker exec ollama ollama pull {{ openclaw_ollama_model }}"
  register: ollama_pull
  changed_when: "'pulling' in ollama_pull.stdout | default('')"
  when: openclaw_ollama_enabled

- name: Wait for OpenClaw gateway to become reachable
  ansible.builtin.command:
    cmd: docker exec openclaw curl -sf http://localhost:18789/health
  register: _openclaw_health
  until: _openclaw_health is not failed
  retries: "{{ openclaw_health_check_retries }}"
  delay: "{{ openclaw_health_check_delay }}"
  changed_when: false

# --- Agent provisioning ---
- name: List existing OpenClaw agents
  ansible.builtin.command:
    cmd: docker exec openclaw openclaw agents list --json
  register: _openclaw_agents_raw
  changed_when: false
  failed_when: false

- name: Parse existing agent names
  ansible.builtin.set_fact:
    _openclaw_existing_agents: >-
      {{ (_openclaw_agents_raw.stdout | default('[]') | from_json | map(attribute='id') | list)
         if (_openclaw_agents_raw.rc == 0 and _openclaw_agents_raw.stdout | default('') | trim is regex('^\['))
         else [] }}

- name: Create OpenClaw agents
  ansible.builtin.command:
    cmd: >-
      docker exec openclaw openclaw agents add {{ item.name | quote }}
      --model {{ item.model | quote }}
      --non-interactive
      --workspace /home/node/.openclaw/workspace
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.name }} ({{ item.model }})"
  when: item.name not in _openclaw_existing_agents
  register: _agent_create
  changed_when: _agent_create.rc == 0

# --- Security hardening ---
- name: Configure UFW firewall rules
  block:
    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        default: deny

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Display OpenClaw access information
  ansible.builtin.debug:
    msg: |
      OpenClaw is running!

      Gateway          : http://{{ openclaw_bind_address }}:{{ openclaw_gateway_port }}
      Config file      : {{ openclaw_install_dir }}/openclaw-home/openclaw.json
      Data dir         : {{ openclaw_install_dir }}/data

      Active providers:
      {% if openclaw_nvidia_api_key | default('') | length > 0 %}
        - NVIDIA NIM (free) — Kimi K2.5, GLM-5, GLM-4.7, MiniMax M2.5, Nemotron 70B, Qwen 3.5 VL
      {% endif %}
      {% if openclaw_groq_api_key | default('') | length > 0 %}
        - Groq (free) — Llama 3.3 70B, Llama 4 Scout 17B, Whisper audio
      {% endif %}
      {% if openclaw_gemini_api_key | default('') | length > 0 %}
        - Google Gemini (free) — Gemini 2.5 Flash (1M context)
      {% endif %}
      {% if openclaw_deepseek_api_key | default('') | length > 0 %}
        - DeepSeek (paid) — Chat V3 ($0.27/1M), Reasoner R1 ($2.20/1M)
      {% endif %}
      {% if openclaw_ollama_enabled %}
        - Ollama (local) — {{ openclaw_ollama_model }}
      {% endif %}

      Primary model    : {{ openclaw_primary_model }}

      Named agents:
      {% for agent in openclaw_agents %}
        {{ agent.name }} → {{ agent.model }}
      {% endfor %}

      Quick model switch (/model <alias>):
      {% if openclaw_nvidia_api_key | default('') | length > 0 %}
        kimi, glm5, glm47, minimax, nemotron, qwen
      {% endif %}
      {% if openclaw_groq_api_key | default('') | length > 0 %}
        groq-llama, groq-scout
      {% endif %}
      {% if openclaw_gemini_api_key | default('') | length > 0 %}
        gemini-flash
      {% endif %}
      {% if openclaw_deepseek_api_key | default('') | length > 0 %}
        ds, ds-think
      {% endif %}
      {% if openclaw_ollama_enabled %}
        local
      {% endif %}

      Validate with:
        openclaw doctor
        openclaw models list

      Monitor costs:
        openclaw stats usage --period 7d

      Useful commands:
        cd {{ openclaw_install_dir }}
        docker compose logs -f          # follow logs
        docker compose ps               # list services
        docker compose down              # stop all services
        docker compose pull && docker compose up -d  # upgrade
