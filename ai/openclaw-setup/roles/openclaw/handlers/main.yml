---
# The socat proxy sidecar shares OpenClaw's network namespace
# (network_mode: service:openclaw). A plain `restart` leaves the proxy
# with a stale namespace reference. down+up avoids this.
- name: Restart openclaw
  ansible.builtin.shell: |
    cd {{ openclaw_install_dir }}
    docker compose down
    docker compose up -d
  changed_when: true
