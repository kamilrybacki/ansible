---
# OpenClaw install directory
openclaw_install_dir: "/opt/openclaw"

# OpenClaw Docker image
openclaw_image: "ghcr.io/openclaw/openclaw:latest"

# Gateway port (protected by UFW – only 443/SSH allowed externally)
openclaw_gateway_port: 18789

# --- Provider: NVIDIA NIM (free, 6 models) ---
openclaw_nvidia_api_key: ""
openclaw_nvidia_rpm: 40

# --- Provider: Groq (free, fast inference) ---
openclaw_groq_api_key: ""
openclaw_groq_rpm: 30

# --- Provider: Google Gemini (free tier, 1500 req/day) ---
openclaw_gemini_api_key: ""
openclaw_gemini_rpm: 15

# --- Provider: DeepSeek (paid, cheap) ---
openclaw_deepseek_api_key: ""
openclaw_deepseek_rpm: 60

# --- Provider: Ollama (local, zero-cost, fully private) ---
openclaw_ollama_enabled: true
openclaw_ollama_base_url: "http://ollama:11434"
openclaw_ollama_model: "qwen2.5:0.5b"
openclaw_ollama_context_window: 4096
openclaw_ollama_gpu_enabled: false

# Docker image for Ollama sidecar
openclaw_ollama_image: "ollama/ollama:latest"

# --- Routing defaults ---
# Primary model for simple tasks
openclaw_primary_model: "nvidia/moonshotai/kimi-k2.5"

# Heartbeat model (lightweight local model, every 30m — zero API cost)
openclaw_heartbeat_model: "ollama/qwen2.5:0.5b"
openclaw_heartbeat_interval: 1800

# Complex task model (paid)
openclaw_complex_model: "deepseek/deepseek-chat"

# Deep thinking model (paid, reasoning)
openclaw_thinking_model: "deepseek/deepseek-reasoner"

# --- Chat channels ---
openclaw_telegram_bot_token: ""
# Telegram user IDs to auto-approve (skip pairing flow)
openclaw_telegram_allowed_users: []

# --- Community agents (awesome-openclaw-agents) ---
# Clone and install all agents from the community catalog
openclaw_community_agents_repo: "https://github.com/mergisi/awesome-openclaw-agents.git"
openclaw_community_agents_enabled: true
openclaw_community_agents_model: "nvidia/moonshotai/kimi-k2.5"

# --- Named agents ---
# Each agent is created via `openclaw agents add` at deploy time.
# Note: agents are created regardless of provider API key status.
openclaw_agents:
  - name: quick-chat
    model: "groq/llama-3.3-70b-versatile"
    emoji: "💬"
    display_name: "Quick Chat"
  - name: code-helper
    model: "nvidia/moonshotai/kimi-k2.5"
    emoji: "💻"
    display_name: "Code Helper"
  - name: infra-ops
    model: "nvidia/moonshotai/kimi-k2.5"
    emoji: "🔧"
    display_name: "Infra Ops"
  - name: deep-coder
    model: "deepseek/deepseek-chat"
    emoji: "🧠"
    display_name: "Deep Coder"

# --- Security ---
# Bind to all interfaces so Caddy (running in Docker) can proxy to this port.
# UFW blocks port {{ openclaw_gateway_port }} from external access, so 0.0.0.0 is safe.
openclaw_bind_address: "0.0.0.0"

# Port exposed by the socat sidecar on homelab-net (OpenClaw binds to 127.0.0.1
# internally, so Caddy cannot reach it directly on the container network).
openclaw_proxy_port: 18790
openclaw_allow_tailscale: true

# Health-check settings
openclaw_health_check_retries: 18
openclaw_health_check_delay: 10
