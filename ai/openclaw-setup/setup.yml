---
# OpenClaw Secret Bootstrap Playbook
# Writes Portkey gateway key to Vault and creates the K8s Secret.
# All deployment config lives in charts/openclaw (managed by ArgoCD).
#
# Usage:
#   ansible-playbook ai/openclaw-setup/setup.yml

# -- Play 1: Write keys to Vault ---------------------------------------------
- name: Write OpenClaw secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: portkey_gateway_key
      prompt: "Portkey gateway auth key (same value as portkey_api_key from portkey-setup)"
      private: true

  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Validate gateway key is provided
      ansible.builtin.assert:
        that:
          - portkey_gateway_key | default('') | length > 0
        fail_msg: "Portkey gateway key is required."

    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "openclaw"
        vault_secrets_data:
          portkey_gateway_key: "{{ portkey_gateway_key }}"
      when: _vault_available | bool

# -- Play 2: Create K8s Secret -----------------------------------------------
- name: Create OpenClaw K8s Secret
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_local_path: "{{ lookup('env', 'HOME') }}/.kube/lw-c1.yaml"
  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load OpenClaw secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "openclaw"

    - name: Create openclaw namespace
      ansible.builtin.command: >
        kubectl create namespace openclaw --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _ns
      changed_when: "'created' in _ns.stdout"

    - name: Create openclaw-secrets K8s Secret
      ansible.builtin.command: >
        kubectl create secret generic openclaw-secrets
        --namespace openclaw
        --from-literal=portkey_gateway_key={{ _vault_secrets.portkey_gateway_key | quote }}
        --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _secret
      changed_when: "'configured' in _secret.stdout or 'created' in _secret.stdout"
      no_log: true

    - name: Display completion
      ansible.builtin.debug:
        msg: |
          OpenClaw secret updated. ArgoCD will sync the new config automatically.
          Secret: openclaw-secrets in namespace openclaw
          Vault path: secret/homelab/openclaw

# -- Play 3: Add OAuth provider tokens (optional) ----------------------------
- name: Add OAuth provider tokens to OpenClaw
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_local_path: "{{ lookup('env', 'HOME') }}/.kube/lw-c1.yaml"
  vars_prompt:
    - name: add_oauth_provider
      prompt: |

        ══════════════════════════════════════════════
          OpenClaw OAuth Provider Setup (optional)
        ══════════════════════════════════════════════

        Add an OAuth provider token? (e.g. openai-codex)
        Leave blank to skip.

        Provider id
      default: ""
      private: false

    - name: oauth_token
      prompt: |
        Paste the OAuth/API token for this provider.
        (Run 'openclaw models auth login --provider <id>' locally first to obtain it)

        Token
      default: ""
      private: true

    - name: token_expiry
      prompt: "Token expiry duration (e.g. 365d, 12h, leave blank for no expiry)"
      default: ""
      private: false

  tasks:
    - name: Skip if no provider specified
      ansible.builtin.meta: end_play
      when: add_oauth_provider | default('') | length == 0

    - name: Validate token is provided
      ansible.builtin.assert:
        that:
          - oauth_token | default('') | length > 0
        fail_msg: "Token is required when adding an OAuth provider."

    - name: Store OAuth token in Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "openclaw"
        vault_secrets_data:
          "{{ add_oauth_provider }}_token": "{{ oauth_token }}"

    - name: Inject token into OpenClaw via paste-token
      ansible.builtin.command: >
        kubectl exec -n openclaw deployment/openclaw --
        openclaw models auth paste-token
        --provider {{ add_oauth_provider | quote }}
        {% if token_expiry | default('') | length > 0 %}--expires-in {{ token_expiry | quote }}{% endif %}
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _paste_token
      changed_when: "'profile' in (_paste_token.stdout | default(''))"
      args:
        stdin: "{{ oauth_token }}"

    - name: Display OAuth provider result
      ansible.builtin.debug:
        msg: |
          OAuth token injected for provider: {{ add_oauth_provider }}
          {% if token_expiry | default('') | length > 0 %}Expires in: {{ token_expiry }}{% endif %}
          Token also stored in Vault at: secret/homelab/openclaw/{{ add_oauth_provider }}_token

          To add the provider to openclaw.json config, update the Helm chart values
          or run: kubectl exec -n openclaw deployment/openclaw -- openclaw models add ...
