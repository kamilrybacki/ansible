---
# SWE-AF Setup Playbook
# Deploys the SWE-AF autonomous engineering runtime via Docker Compose.
#
# Usage:
#   ansible-playbook ai/swe-af-setup/setup.yml

# Play 0: Check Vault
- name: Check Vault availability
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "swe-af"
      when: _vault_available | bool

# Play 1: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host
      prompt: "Target host IP/hostname (enter 'localhost' for this machine)"
      default: "localhost"
      private: false

    - name: target_user
      prompt: "SSH user for the target (ignored if localhost)"
      default: ""
      private: false

    - name: ai_provider
      prompt: |

        Choose AI provider:
          1) anthropic     – Anthropic API key
          2) claude_oauth  – Claude Code OAuth token
          3) openrouter    – OpenRouter + optional OpenAI/Google/Zhipu keys
        Enter provider name
      default: "anthropic"
      private: false

    - name: api_key
      prompt: "API key for chosen provider (e.g. sk-ant-api03-...)"
      default: "{{ hostvars['localhost']['_vault_secrets']['api_key'] | default('') }}"
      private: true

    - name: gh_token
      prompt: "GitHub personal access token for PR workflows (optional, press Enter to skip)"
      default: "{{ hostvars['localhost']['_vault_secrets']['gh_token'] | default('') }}"
      private: true

  tasks:
    - name: Add target to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: swe_af_targets
        ansible_connection: ssh
        ansible_user: "{{ target_user }}"
        ansible_python_interpreter: /usr/bin/python3
        swe_af_ai_provider: "{{ ai_provider }}"
        swe_af_api_key: "{{ api_key }}"
        swe_af_gh_token: "{{ gh_token }}"
      when: target_host != 'localhost'

    - name: Add target to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: swe_af_targets
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        swe_af_ai_provider: "{{ ai_provider }}"
        swe_af_api_key: "{{ api_key }}"
        swe_af_gh_token: "{{ gh_token }}"
      when: target_host == 'localhost'

# Play 1.5: Store secrets to Vault
- name: Store SWE-AF secrets to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Store secrets to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "swe-af"
        vault_secrets_data:
          api_key: "{{ hostvars[groups['swe_af_targets'][0]]['swe_af_api_key'] | default('') }}"
          gh_token: "{{ hostvars[groups['swe_af_targets'][0]]['swe_af_gh_token'] | default('') }}"
      when: _vault_available | default(false) | bool

# Play 2: Provision SWE-AF
- name: Provision SWE-AF
  hosts: swe_af_targets
  gather_facts: true
  become: true
  roles:
    - prerequisites
    - swe_af
