---
- name: Check that Claude Code CLI is available
  ansible.builtin.command: which claude
  register: claude_cli_check
  changed_when: false
  failed_when: claude_cli_check.rc != 0

- name: Skip MCP configuration if no token provided
  ansible.builtin.debug:
    msg: |
      No MCP Access Token was provided — skipping Claude Code MCP configuration.

      To complete setup:
        1. Log in to n8n at http://{{ n8n_host_ip }}:{{ n8n_port }}
        2. Go to Settings > Instance-level MCP
        3. Copy your MCP Access Token from the Access Token tab
        4. Re-run this playbook and provide the token when prompted

        Or run manually:
          claude mcp add --transport http -s {{ mcp_scope }} \
            --header "Authorization: Bearer <your-mcp-access-token>" \
            {{ mcp_server_name }} http://{{ n8n_host_ip }}:{{ n8n_port }}/mcp-server/http
  when: n8n_mcp_token | default('') == ''

- name: Check if MCP server is already configured
  ansible.builtin.command: claude mcp list -s {{ mcp_scope }}
  register: existing_mcp
  changed_when: false
  failed_when: false
  when: n8n_mcp_token | default('') != ''

- name: Add MCP server to Claude Code
  ansible.builtin.command: >-
    claude mcp add
    --transport http
    -s {{ mcp_scope }}
    --header "Authorization: Bearer {{ n8n_mcp_token }}"
    {{ mcp_server_name }}
    http://{{ n8n_host_ip }}:{{ n8n_port }}/mcp-server/http
  no_log: true
  when:
    - n8n_mcp_token | default('') != ''
    - mcp_server_name not in (existing_mcp.stdout | default(''))

- name: Read Claude config for verification
  ansible.builtin.slurp:
    src: "{{ claude_json_path }}"
  register: claude_config
  when: n8n_mcp_token | default('') != ''

- name: Verify MCP entry exists in Claude config
  ansible.builtin.assert:
    that:
      - "mcp_server_name in (claude_config.content | b64decode)"
    fail_msg: "MCP server '{{ mcp_server_name }}' was not found in {{ claude_json_path }}"
    success_msg: "MCP server '{{ mcp_server_name }}' is configured in {{ claude_json_path }}"
  when: n8n_mcp_token | default('') != ''

- name: Display summary
  ansible.builtin.debug:
    msg: |
      Claude Code MCP configuration complete.

      Server name: {{ mcp_server_name }}
      MCP URL:     http://{{ n8n_host_ip }}:{{ n8n_port }}/mcp-server/http
      Scope:       {{ mcp_scope }}
      Auth:        Bearer token configured

      Verify with: claude mcp list
  when: n8n_mcp_token | default('') != ''
