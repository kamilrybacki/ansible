---
# Play 1: Gather connection details and build dynamic inventory
- name: Gather connection details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: n8n_host_ip
      prompt: "IP or hostname of the n8n host machine"
      private: false

    - name: n8n_ssh_user
      prompt: "SSH user for the n8n host"
      private: false

    - name: claude_host_ip
      prompt: "IP or hostname of the Claude Code client (enter 'localhost' if this machine)"
      default: "localhost"
      private: false

    - name: claude_ssh_user
      prompt: "SSH user for the Claude Code client (ignored if localhost)"
      default: ""
      private: false

    - name: n8n_owner_email
      prompt: "Email for the n8n owner account"
      private: false

    - name: n8n_owner_password
      prompt: "Password for the n8n owner account"
      private: true

    - name: n8n_owner_first_name
      prompt: "First name for the n8n owner account"
      default: "Admin"
      private: false

    - name: n8n_owner_last_name
      prompt: "Last name for the n8n owner account"
      default: "User"
      private: false

    - name: n8n_mcp_token
      prompt: "n8n MCP Access Token (leave blank on first run — retrieve from n8n UI after setup)"
      default: ""
      private: true

  tasks:
    - name: Add n8n host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ n8n_host_ip }}"
        groups: n8n_hosts
        ansible_user: "{{ n8n_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        n8n_owner_email: "{{ n8n_owner_email }}"
        n8n_owner_password: "{{ n8n_owner_password }}"
        n8n_owner_first_name: "{{ n8n_owner_first_name }}"
        n8n_owner_last_name: "{{ n8n_owner_last_name }}"
      no_log: true

    - name: Add Claude Code client to dynamic inventory (remote)
      ansible.builtin.add_host:
        name: "{{ claude_host_ip }}"
        groups: claude_clients
        ansible_user: "{{ claude_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        n8n_host_ip: "{{ n8n_host_ip }}"
        n8n_port: "{{ n8n_port }}"
        n8n_mcp_token: "{{ n8n_mcp_token }}"
      no_log: true
      when: claude_host_ip != 'localhost'

    - name: Add Claude Code client to dynamic inventory (local)
      ansible.builtin.add_host:
        name: localhost
        groups: claude_clients
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
        n8n_host_ip: "{{ n8n_host_ip }}"
        n8n_port: "{{ n8n_port }}"
        n8n_mcp_token: "{{ n8n_mcp_token }}"
      no_log: true
      when: claude_host_ip == 'localhost'

# Play 2: Install Docker, deploy n8n, and create the owner account
- name: Install Docker and run n8n
  hosts: n8n_hosts
  become: true
  roles:
    - docker
    - n8n

# Play 3: Configure Claude Code MCP on the client machine
- name: Configure Claude Code MCP integration
  hosts: claude_clients
  roles:
    - claude_mcp
