---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Create mock claude CLI
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          # Mock claude CLI for molecule testing
          case "$1" in
            mcp)
              case "$2" in
                list)
                  echo ""
                  ;;
                add)
                  echo "Added MCP server: $5"
                  ;;
                *)
                  echo "mock claude mcp: $@"
                  ;;
              esac
              ;;
            *)
              echo "mock claude: $@"
              ;;
          esac
          exit 0
        dest: /usr/local/bin/claude
        mode: "0755"
  roles:
    - role: mcp_servers
