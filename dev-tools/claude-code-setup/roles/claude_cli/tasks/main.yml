---
- name: Check if Claude Code CLI is available
  ansible.builtin.command: which claude
  register: claude_check
  changed_when: false
  failed_when: false

- name: Check if Node.js is available
  ansible.builtin.command: node --version
  register: node_check
  changed_when: false
  failed_when: false
  when: claude_check.rc != 0

- name: Parse Node.js major version
  ansible.builtin.set_fact:
    node_current_major: "{{ node_check.stdout | default('v0') | regex_replace('^v(\\d+).*', '\\1') | int }}"
  when: claude_check.rc != 0

- name: Install Node.js via NodeSource APT repository
  when:
    - claude_check.rc != 0
    - node_current_major | int < node_min_version
  block:
    - name: Install prerequisites for NodeSource
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add NodeSource GPG key
      become: true
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add NodeSource APT repository
      become: true
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
        filename: nodesource
        state: present

    - name: Install Node.js
      become: true
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

- name: Install Claude Code CLI globally
  become: true
  ansible.builtin.command:
    cmd: "npm install -g {{ claude_code_package }}"
  register: npm_install_result
  changed_when: "'added' in npm_install_result.stdout or 'updated' in npm_install_result.stdout"
  when: claude_check.rc != 0

- name: Verify Claude Code CLI installation
  ansible.builtin.command: claude --version
  register: claude_version
  changed_when: false

- name: Display Claude Code version
  ansible.builtin.debug:
    msg: "Claude Code CLI version: {{ claude_version.stdout }}"
