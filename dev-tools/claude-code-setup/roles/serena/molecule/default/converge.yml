---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Install pipx and python3-pip
      ansible.builtin.apt:
        name:
          - pipx
          - python3-pip
          - python3-venv
        state: present
        update_cache: true
    - name: Create Serena config source directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../files/serena"
        state: directory
        mode: "0755"
    - name: Create stub Serena config file
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../files/serena/serena_config.yml"
        content: |
          ---
          # Stub config for testing
        mode: "0644"
  roles:
    - role: serena
